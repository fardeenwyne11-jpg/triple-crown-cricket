<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<style>
  :root{
    --bg:#0a1410;             /* near-black with green undertone */
    --bg-alt:#101c16;
    --panel:#16241c;          /* dark panel */
    --panel2:#1f3328;
    --line:#2d4a39;           /* subtle green border */
    --line-soft:#1f3328;
    --ink:#f0f5ea;            /* off-white text */
    --ink-soft:#c4d0bd;
    --muted:#7a8a7d;
    --gold:#e8c478;
    --gold-bright:#f5d384;
    --gold-deep:#c8a55e;
    --green:#3ddc97;          /* vivid mint (38-0 style) */
    --green-deep:#2eb47a;
    --green-light:#6dffb4;
    --green-soft:#1a3328;
    --red:#ff5d73;            /* coral red */
    --red-deep:#c8102e;
    --red-light:#ff8a99;
    --blue:#5a99ff;
    --teal:#2dd4bf; --purple:#a578f0;
    --label:#c4d0bd;          /* section heading color (was red) */
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:repeating-linear-gradient(135deg,transparent 0,transparent 80px,rgba(255,255,255,.025) 80px,rgba(255,255,255,.025) 81px),var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;min-height:100%;overflow-x:hidden}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}::-webkit-scrollbar-track{background:transparent}

  .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
  .app.no-sidebar{grid-template-columns:1fr}
  @media(max-width:900px){.app{grid-template-columns:1fr}}
  .sidebar{background:linear-gradient(180deg,var(--panel),var(--bg-alt));border-right:3px solid var(--green);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}
  @media(max-width:900px){.sidebar{position:static;height:auto;border-right:0;border-bottom:3px solid var(--green)}}
  .main{padding:30px 28px 100px;max-width:1100px;margin:0 auto;width:100%;min-width:0}
  .screen-enter{animation:screenIn .22s ease}
  @keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .diff-badge{display:inline-flex;align-items:center;gap:6px;flex-shrink:0}
  .diff-dots{display:inline-flex;gap:3px;align-items:center}
  .diff-dots .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .diff-lbl{font-size:11px;font-weight:800;letter-spacing:.4px}

  h1{font-size:30px;margin:0 0 4px;letter-spacing:.5px;color:var(--ink);font-weight:900}
  h2{font-size:12px;margin:18px 0 10px;color:var(--label);text-transform:uppercase;letter-spacing:2.5px;font-weight:800}
  h3{font-size:16px;margin:0 0 8px;color:var(--ink);font-weight:800}
  .muted{color:var(--muted)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  .pill{display:inline-block;padding:5px 12px;border-radius:999px;font-size:11px;color:var(--muted);border:1px solid var(--line);background:var(--panel2);font-weight:800;letter-spacing:.3px}
  .pill.reroll{color:var(--gold);border-color:var(--gold-deep);background:rgba(245,196,81,.08)}
  .pill.warn{background:#f8d7da;color:var(--red);border-color:var(--red)}
  .pill.ok{background:#d4edda;color:var(--green-deep);border-color:var(--green)}

  button{background:var(--panel);color:var(--ink);border:2px solid var(--line);padding:10px 18px;border-radius:999px;font-weight:800;cursor:pointer;font-size:13px;transition:all .15s ease;box-shadow:0 2px 0 var(--line-soft)}
  button:hover:not(:disabled){border-color:var(--gold);transform:translateY(-1px)}
  button:active:not(:disabled){transform:translateY(0);box-shadow:0 1px 0 var(--line-soft)}
  button.primary{background:var(--green);color:#fff;border-color:var(--green-deep);box-shadow:0 2px 0 var(--green-deep)}
  button.primary:hover:not(:disabled){border-color:var(--green-deep);box-shadow:0 3px 0 var(--green-deep)}
  button.gold{background:var(--gold-bright);color:#fff;border-color:var(--gold-deep);box-shadow:0 2px 0 var(--gold-deep)}
  button.danger{background:var(--red);color:#fff;border-color:var(--red-deep);box-shadow:0 2px 0 var(--red-deep)}
  button.ghost{background:transparent;border-color:var(--line-soft);box-shadow:none}
  button:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

  .opt{display:inline-block;padding:12px 14px;border:2px solid var(--line);border-radius:10px;cursor:pointer;background:var(--panel);font-size:13px;transition:all .15s ease;text-align:center;font-weight:800;flex:1;min-width:120px;color:var(--ink)}
  .opt:hover{border-color:var(--gold);transform:translateY(-1px)}
  .opt.active{border-color:var(--green-deep);background:#d4edda;color:var(--green-deep)}
  .opt.disabled{opacity:.45;cursor:not-allowed;filter:grayscale(1)}
  .opt.disabled:hover{border-color:var(--line);transform:none}
  .opt.disabled small{color:var(--gold)}
  .opt small{display:block;color:var(--muted);font-size:10px;margin-top:3px;font-weight:600;letter-spacing:.3px}
  .opt.active small{color:var(--green-deep)}
  .opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}

  /* Country code flag chip */
  .cc{display:inline-flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:2px 6px;font-size:10px;font-weight:800;color:var(--ink);letter-spacing:.5px;line-height:1;vertical-align:middle}
  .cc-flag{font-size:13px;line-height:1}
  .cc-code{font-size:9px;letter-spacing:.6px;color:var(--ink)}

  /* Role tags (light theme) */
  .tag{font-size:10px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:.5px;color:#fff;line-height:1.4}
  .t-OPN{background:var(--blue)}
  .t-BAT{background:#3a89e0}
  .t-WK{background:var(--gold);color:#3a2a08}
  .t-AR{background:var(--green-deep)}
  .t-SPN{background:var(--red)}
  .t-PAC{background:var(--red-deep)}
  .t-FIN{background:#2dd4bf;color:#053a36}

  /* === Squad sidebar slots === */
  .squad-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .slot{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel);border:2px dashed var(--line);border-radius:8px;font-size:12px;min-height:42px;transition:all .2s ease}
  .slot.filled{border-style:solid;background:var(--bg-alt);box-shadow:0 1px 0 var(--line-soft);animation:slotIn .35s ease}
  @keyframes slotIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .slot .num{font-size:13px;color:var(--gold-deep);font-weight:900;width:22px;flex-shrink:0;text-align:center}
  .slot .name{flex:1;min-width:0;overflow:hidden}
  .slot .name b{display:block;font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:800}
  .slot .name small{display:block;color:var(--muted);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slot .rating{font-weight:900;color:var(--gold-deep);font-size:14px}
  .slot .empty{color:#b3a987;font-style:italic}
  .strength-card{margin-top:14px;background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;padding:12px}
  .strength-card .ts-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .strength-card .ts-title{font-size:10px;letter-spacing:1.5px;font-weight:800;color:var(--muted)}
  .ts-overall{font-size:24px;font-weight:900;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums;display:inline-flex;align-items:baseline;gap:3px}
  .ts-overall small{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:1px}
  .reroll-btn{background:rgba(245,196,81,.08);color:var(--gold);border:1px solid var(--gold-deep);border-radius:999px;padding:8px 18px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:none}
  .reroll-btn:hover{background:rgba(245,196,81,.18)}
  .ts-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .ts-row:last-child{margin-bottom:0}
  .ts-lbl{font-size:11px;font-weight:800;color:var(--ink);width:74px;flex-shrink:0}
  .ts-bar{flex:1;height:7px;background:var(--panel2);border-radius:4px;overflow:hidden}
  .ts-bar.masked{background:repeating-linear-gradient(45deg,var(--panel2),var(--panel2) 4px,var(--line) 4px,var(--line) 8px)}
  .ts-bar > i{display:block;height:100%;border-radius:4px;transition:width .35s ease}
  .ts-bar > i.bat{background:#3a89e0}
  .ts-bar > i.bowl{background:#c8102e}
  .ts-bar > i.field{background:#3ddc97}
  .ts-val{font-size:13px;font-weight:900;color:var(--ink);width:24px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
  .slot .x{background:transparent;border:0;color:var(--muted);padding:2px 6px;cursor:pointer;font-size:14px;box-shadow:none}
  .slot .x:hover{color:var(--red);transform:none;box-shadow:none;border-color:transparent}

  .role-tally{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;padding:8px;background:var(--bg-alt);border:1px solid var(--line);border-radius:8px}
  .role-tally .t{font-size:10px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:.4px;color:#fff}
  .role-tally .t.zero{opacity:.25}

  .wk-warn{margin-top:8px;padding:8px 10px;background:#f8d7da;border:1px solid var(--red);border-radius:8px;font-size:11px;color:var(--red);font-weight:800;text-align:center;animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}

  /* Hero */
  .hero{text-align:center;padding:40px 20px;background:linear-gradient(180deg,rgba(45,122,77,.08),transparent 60%),var(--panel);border:2px solid var(--line);border-radius:16px;margin-bottom:24px;position:relative;overflow:hidden;box-shadow:0 2px 0 var(--line-soft),0 8px 32px rgba(168,122,14,.08)}
  .screen-enter .hero{animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:6px;background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 14px,#fff 14px,#fff 28px);opacity:.85}
  .hero h1{font-size:56px;letter-spacing:3px;margin-bottom:6px;color:var(--ink);font-weight:900}
  .hero-ww{background:radial-gradient(ellipse at 50% 0%,rgba(61,220,151,.16),transparent 62%),var(--panel);border-color:#2c6b4d}
  .ww-kicker{font-size:12px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:var(--gold)}
  .ww-ask{font-size:22px;font-weight:800;color:var(--ink-soft);letter-spacing:.5px;margin-top:12px}
  .ww-word{font-size:clamp(40px,11vw,58px);font-weight:900;letter-spacing:.5px;line-height:1;background:linear-gradient(180deg,#fff,var(--green));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(61,220,151,.18);margin:6px 0 0}
  .ww-def{font-size:15px;color:var(--ink-soft);max-width:430px;margin:16px auto 0;line-height:1.55}
  .ww-def b{color:#fff}
  .hero p{color:var(--muted);margin:0 0 18px;font-size:15px;max-width:560px;margin:0 auto}

  /* Setup */
  .setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:760px){.setup-grid{grid-template-columns:1fr}}
  .setup-card{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 2px 0 var(--line-soft)}
  .setup-step{margin-bottom:18px}
  .setup-step.active{animation:stepIn .28s ease}
  .team-name-input{width:100%;padding:13px 16px;border-radius:12px;border:2px solid var(--line);background:var(--panel);color:var(--ink);font-size:16px;font-weight:800;outline:none;transition:border-color .15s ease}
  .team-name-input:focus{border-color:var(--green)}
  .team-name-input.invalid{border-color:var(--red)}
  .team-name-input::placeholder{color:var(--muted);font-weight:600}
  .name-err{color:var(--red);font-size:12px;font-weight:700;margin-top:6px;min-height:14px}
  .setup-step.done{opacity:.7}
  .step-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .step-head b{font-size:16px;color:var(--ink)}
  .step-no{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-weight:900;font-size:13px;flex-shrink:0}
  .setup-step.done .step-no{background:var(--green-deep)}
  @keyframes stepIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* Spin */
  .spin-box{background:linear-gradient(135deg,rgba(45,122,77,.04),transparent 60%),var(--panel);border:2px solid var(--line);border-radius:16px;padding:36px 30px;text-align:center;margin:14px 0;position:relative;box-shadow:0 2px 0 var(--line-soft)}
  .spin-box .lbl{color:var(--label);font-size:11px;letter-spacing:2.5px;font-weight:800;margin-bottom:8px}
  .pos-left{color:var(--muted);font-size:13px;margin-bottom:22px;font-weight:600}

  /* Green spin button (38-0 style) */
  .spin-btn{background:var(--green);color:#053a26;border:0;padding:16px 36px;border-radius:999px;font-weight:900;font-size:16px;cursor:pointer;letter-spacing:.5px;box-shadow:0 6px 20px rgba(61,220,151,.3);position:relative;transition:all .2s ease;display:inline-flex;align-items:center;gap:10px}
  .spin-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(61,220,151,.45)}
  .spin-btn:active{transform:translateY(0)}
  .spin-tap-hint{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-top:10px;font-weight:600}

  /* CLUB | SEASON visualisation boxes */
  .spin-boxes{display:flex;align-items:stretch;gap:12px;margin:14px auto 10px;width:100%;max-width:440px;justify-content:center}
  .spin-box-stub{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:14px 12px;flex:1 1 0;min-width:0;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
  .spin-box-stub .lbl-mini{position:absolute;top:-9px;left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--panel);padding:0 8px;font-size:9px;color:var(--muted);font-weight:800;letter-spacing:1.6px}
  .spin-box-stub .val{font-size:15px;font-weight:800;color:var(--ink);text-align:center;line-height:1.25;word-break:break-word}
  .spin-x{color:var(--muted);font-weight:700;font-size:14px;align-self:center;flex:0 0 auto}
  /* Mobile: trim the card padding + gap so the two equal cells fit the screen */
  @media(max-width:560px){
    .spin-box{padding-left:16px;padding-right:16px}
    .spin-boxes{gap:8px}
    .spin-boxes .spin-box-stub{padding:14px 8px}
  }
  .spun-league{font-size:10px;color:var(--muted);font-weight:800;letter-spacing:2px;margin:0 0 14px}

  /* Expected odds screen */
  .odds-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px}
  .odds-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:14px;flex-wrap:wrap}
  .odds-row .ttl{font-size:10px;color:var(--muted);letter-spacing:1.8px;font-weight:800;text-transform:uppercase}
  .odds-row .val{font-size:32px;font-weight:900;color:var(--ink);font-variant-numeric:tabular-nums}
  .odds-row .val.green{color:var(--green)}
  .odds-bars{margin-top:14px;display:flex;flex-direction:column;gap:12px}
  .odds-bar{display:flex;flex-direction:column;gap:4px}
  .odds-bar .hd{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--ink)}
  .odds-bar .hd .pct{color:var(--ink);font-weight:900;font-variant-numeric:tabular-nums}
  .odds-bar .track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
  .odds-bar .track > i{display:block;height:100%;border-radius:3px;transition:width .8s ease}
  .odds-bar.gold .track > i{background:linear-gradient(90deg,#f0b94a,#e8c478)}
  .odds-bar.green .track > i{background:var(--green)}
  .odds-bar.blue .track > i{background:var(--blue)}
  .odds-bar.purple .track > i{background:var(--purple)}
  .odds-bar.red .track > i{background:var(--red)}

  /* Tournament summary */
  .trophy-lift{text-align:center;padding:22px 16px 16px;margin-bottom:16px;background:radial-gradient(ellipse at 50% 35%,rgba(245,196,81,.16),transparent 65%);border-radius:16px}
  .tl-trophy{font-size:74px;line-height:1;animation:trophyLift 1s cubic-bezier(.2,.85,.25,1.15) both;filter:drop-shadow(0 8px 16px rgba(245,196,81,.45))}
  .tl-title{font-size:30px;font-weight:900;letter-spacing:4px;margin-top:8px;background:linear-gradient(180deg,#f5c451,#d4a435);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .tl-sub{font-size:13px;color:var(--muted);font-weight:800;letter-spacing:.5px;margin-top:4px;text-transform:uppercase}
  @keyframes trophyLift{0%{transform:translateY(46px) scale(.55);opacity:0}55%{transform:translateY(-10px) scale(1.14);opacity:1}100%{transform:translateY(0) scale(1)}}
  .verdict-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
  @media(max-width:600px){.verdict-row{grid-template-columns:1fr 1fr}}
  .verdict-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .verdict-card .ttl{font-size:9px;color:var(--muted);letter-spacing:1.6px;font-weight:800;text-transform:uppercase;margin-bottom:6px}
  .verdict-card .val{font-size:28px;font-weight:900;color:var(--ink)}
  .verdict-card.dim .val{color:var(--muted)}
  .verdict-card.outcome .val{font-size:14px;color:var(--gold-bright);font-weight:900;letter-spacing:1px}
  .narrative{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .narrative h3{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);margin-bottom:8px;font-weight:900}
  .narrative p{margin:0;color:var(--ink-soft);font-size:14px;line-height:1.5}
  .narrative .epi{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;font-style:italic}
  .big-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
  @media(max-width:520px){.big-stats{grid-template-columns:1fr 1fr}}
  .big-stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .big-stat .v{font-size:34px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
  .big-stat .v.g{color:var(--green)}
  .big-stat .v.y{color:var(--gold-bright)}
  .big-stat .v.r{color:var(--red)}
  .big-stat .v.b{color:var(--blue)}
  .big-stat .l{font-size:11px;color:var(--muted);letter-spacing:1.2px;margin-top:4px;text-transform:uppercase;font-weight:700}

  /* Splash screen (intro animation) */
  #splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .6s ease}
  #splash.fade{opacity:0;pointer-events:none}
  .splash-inner{text-align:center;animation:splashIn .9s cubic-bezier(.18,1,.32,1)}
  .splash-logo{font-size:clamp(40px,12vw,72px);font-weight:900;letter-spacing:4px;line-height:1;background:linear-gradient(180deg,#fff,var(--green));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:splashBeat 1.6s ease-in-out infinite;text-shadow:0 0 40px rgba(61,220,151,.15)}
  .splash-tagline{color:var(--green-light);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:14px;font-weight:800;max-width:300px;margin-left:auto;margin-right:auto;line-height:1.6}
  .splash-ball{width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 30% 28%,#e5777f,#c8102e 50%,#7a0a18);margin:30px auto 0;position:relative;animation:splashSpin 1.5s linear infinite;box-shadow:0 8px 30px rgba(200,16,46,.45),inset 0 -3px 8px rgba(0,0,0,.35)}
  .splash-ball::before,.splash-ball::after{content:"";position:absolute;left:15%;right:15%;height:2px;background:#fff8e1;opacity:.6;border-radius:1px}
  .splash-ball::before{top:42%}
  .splash-ball::after{top:58%}
  .splash-bat{font-size:32px;margin-top:14px;animation:splashWobble 1.2s ease-in-out infinite;display:inline-block}
  @keyframes splashIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes splashBeat{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.04);filter:brightness(1.15)}}
  @keyframes splashSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes splashWobble{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

  /* Mobile squad mini (visible only on mobile during draft/auction) */
  .mobile-squad-mini{display:none;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px}
  .mobile-squad-mini .msm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .mobile-squad-mini .msm-head b{font-size:12px;letter-spacing:1.5px;color:var(--ink)}
  .mobile-squad-mini .msm-tally{display:flex;flex-wrap:wrap;gap:4px}
  .mobile-squad-mini .msm-tally .t{font-size:10px;font-weight:800;padding:3px 7px;border-radius:5px;color:#fff;letter-spacing:.4px}
  .mobile-squad-mini .msm-tally .t.zero{opacity:.25}
  .mobile-squad-mini .msm-wk{margin-top:8px;padding:6px 10px;background:rgba(255,93,115,.12);border:1px solid var(--red);border-radius:6px;font-size:11px;color:var(--red);font-weight:700;text-align:center}
  @media(max-width:900px){.mobile-squad-mini{display:block}}

  /* League sim */
  .league-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:14px;margin-bottom:16px}
  @media(max-width:760px){.league-grid{grid-template-columns:1fr}}
  .league-results,.league-table{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .league-results h3,.league-table h3{font-size:11px;color:var(--label);letter-spacing:1.8px;font-weight:800;text-transform:uppercase;margin-bottom:10px}
  .lg-feed{max-height:340px;overflow:auto;display:flex;flex-direction:column;gap:6px}
  .lg-match{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px;animation:slideInResult .45s cubic-bezier(.18,1,.32,1)}
  .lg-match.me-win{background:linear-gradient(135deg,rgba(61,220,151,.18),rgba(61,220,151,.06));border-color:var(--green);box-shadow:0 0 16px rgba(61,220,151,.2)}
  .lg-match.me-loss{background:linear-gradient(135deg,rgba(255,93,115,.18),rgba(255,93,115,.06));border-color:var(--red);box-shadow:0 0 16px rgba(255,93,115,.18)}
  @keyframes slideInResult{from{opacity:0;transform:translateY(-8px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .lg-match .gw{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:800;margin-bottom:4px}
  .lg-match .ms{display:flex;justify-content:space-between;align-items:center;gap:6px}
  .lg-match .t{flex:1;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lg-match .t.me{color:var(--gold-bright)}
  .lg-match .t.w{color:var(--green)}
  .lg-match .s{font-variant-numeric:tabular-nums;font-weight:800;color:var(--muted);font-size:13px}
  .lg-tab{width:100%;border-collapse:collapse;font-size:12px}
  .lg-tab th{text-align:left;padding:6px 8px;color:var(--muted);font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--line);font-weight:700}
  .lg-tab th.r{text-align:right}
  .lg-tab td{padding:6px 8px;border-bottom:1px solid var(--line-soft);font-variant-numeric:tabular-nums;color:var(--ink)}
  .lg-tab td.r{text-align:right;font-weight:700}
  .lg-tab tr.me td{background:rgba(232,196,120,.08);color:var(--gold-bright);font-weight:800}
  .lg-tab tr.qual td{border-left:2px solid var(--green)}
  .lg-tab tr.qual td:first-child{border-left:none}
  .lg-tab tr.qual td.pos{color:var(--green)}
  .league-header{text-align:center;margin-bottom:14px}
  .league-header .gw-display{font-size:14px;color:var(--label);letter-spacing:2px;font-weight:800;text-transform:uppercase}
  .league-progress{height:6px;background:var(--panel);border:1px solid var(--line);border-radius:3px;overflow:hidden;margin:8px auto;max-width:400px}
  .league-progress > i{display:block;height:100%;background:var(--green);transition:width .3s ease}

  /* Auction */
  .auction-status{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:14px;flex-wrap:wrap;gap:12px}
  .auction-status .it{display:flex;flex-direction:column}
  .auction-status .it small{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-weight:800;text-transform:uppercase}
  .auction-status .it b{font-size:22px;color:var(--ink);font-variant-numeric:tabular-nums;font-weight:900}
  .auction-status .it b.green{color:var(--green)}
  .auction-status .it b.gold{color:var(--gold-bright)}
  .auction-status .it b.red{color:var(--red)}

  .auction-lot{background:linear-gradient(160deg,var(--panel2),var(--panel));border:2px solid var(--gold);border-radius:16px;padding:24px;text-align:center;margin-bottom:14px;box-shadow:0 8px 28px rgba(232,196,120,.12)}
  .auction-lot .lot-no{font-size:10px;color:var(--muted);letter-spacing:2px;font-weight:800;margin-bottom:10px}
  .auction-lot .auction-avatar{margin-bottom:14px}
  .auction-lot h2.nm{margin:0;font-size:26px;color:var(--ink);letter-spacing:.3px;text-transform:none;font-weight:900}
  .auction-lot .src{color:var(--muted);font-size:13px;margin:6px 0 12px;font-weight:600}
  .auction-lot .roles{display:flex;gap:6px;justify-content:center;margin:8px 0 14px;flex-wrap:wrap}
  .auction-lot .pricetag{display:inline-flex;align-items:baseline;gap:6px;background:var(--bg);padding:10px 18px;border-radius:10px;border:1px solid var(--line);margin:8px 0}
  .auction-lot .pricetag .lbl{font-size:11px;color:var(--muted);letter-spacing:1.5px;font-weight:800}
  .auction-lot .pricetag .px{font-size:32px;color:var(--gold-bright);font-weight:900;font-variant-numeric:tabular-nums}
  .auction-lot .pricetag .c{font-size:13px;color:var(--gold);font-weight:700}
  .auction-actions{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  .auction-actions button{padding:14px 28px;font-size:14px;min-width:140px}
  .auction-timer{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .auction-timer-bar{flex:1;height:8px;background:var(--bg);border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .auction-timer-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--gold-bright),var(--red));transition:width 1s linear}
  .auction-timer-num{font-size:14px;font-weight:900;color:var(--gold-bright);font-variant-numeric:tabular-nums;min-width:36px;text-align:right}
  .spin-btn:active{transform:translateY(0)}

  .reel{height:90px;display:block;position:relative;overflow:hidden;margin:8px 0 4px;border-radius:10px;background:var(--bg-alt);border:1px solid var(--line)}
  /* Two-cell spin reels (CLUB + SEASON) */
  .spin-box-stub.reel-cell{padding:6px 14px;min-height:62px}
  .reel-mini{height:46px;width:100%;display:block;position:relative;overflow:hidden;border:0;background:transparent;margin:0;border-radius:0}
  .reel-mini .reel-item{height:46px;width:100%;justify-content:center;box-sizing:border-box}
  .reel-mini .reel-item .t{font-size:15px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;width:100%;text-align:center;box-sizing:border-box;padding:0 2px;margin:0}
  .reel-mini .reel-item .y{font-size:18px;font-weight:900;color:var(--gold-deep);text-align:center;width:100%;margin:0}
  .reel-track{display:flex;flex-direction:column;width:100%;will-change:transform}
  .reel-item{height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
  .reel-item .t{font-size:24px;font-weight:900;letter-spacing:.5px;color:var(--ink)}
  .reel-item .y{font-size:20px;font-weight:900;color:var(--gold-deep);margin-top:2px}
  .reel-item .f{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1.5px;margin-top:2px}
  .reel.done .reel-item{animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(.85)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

  .trophy-label{font-size:12px;color:var(--red);margin-top:6px;letter-spacing:.5px;font-weight:800}
  .reroll{font-size:12px;color:var(--muted);margin-top:14px;font-weight:600}
  .reroll b{color:var(--gold-deep)}
  .reroll a{color:var(--red);cursor:pointer;text-decoration:none;font-weight:800}
  .reroll a:hover{text-decoration:underline}

  /* Picker (player rows) */
  .picker{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:18px;margin-top:14px;box-shadow:0 2px 0 var(--line-soft);animation:fadeIn .4s ease}
  .picker .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .picker .head .h{font-size:18px;font-weight:900;color:var(--ink)}
  .picker .head .h .y{color:var(--gold-deep)}

  .player{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;background:var(--panel);border:2px solid transparent;margin-bottom:6px;cursor:pointer;transition:all .15s ease;box-shadow:0 1px 0 var(--line-soft)}
  .player:hover{border-color:var(--gold);transform:translateX(2px)}
  .player.disabled{opacity:.4;cursor:not-allowed}
  .player.disabled:hover{border-color:transparent;background:var(--panel);transform:none}
  .player.wk-needed{border-color:var(--gold-bright);background:var(--panel2)}
  .player .r{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;box-shadow:0 2px 4px rgba(168,122,14,.2)}
  .r-90{background:linear-gradient(135deg,#f5c451,#d4a435);color:#1a1300}
  .r-85{background:linear-gradient(135deg,#3ddc97,#2eb47a);color:#053a26}
  .r-80{background:linear-gradient(135deg,#5aa9ff,#3a89e0);color:#0a2548}
  .r-75{background:linear-gradient(135deg,#a578f0,#8558d0);color:#fff}
  .r-70{background:linear-gradient(135deg,#ff7e5d,#e05a3a);color:#fff}
  .r-hide{background:#e0d8b8;color:var(--muted)}
  .player .nm{flex:1;min-width:0}
  .player .nm b{display:block;font-size:14px;color:var(--ink);font-weight:800}
  .player .nm small{color:var(--muted);font-size:11px}
  .tags{display:flex;gap:4px;flex-wrap:wrap;align-items:center}

  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn .2s ease;backdrop-filter:blur(3px)}
  .modal-box{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:22px;max-width:480px;width:100%;max-height:80vh;overflow:auto;animation:popIn .25s ease;box-shadow:0 8px 32px rgba(168,122,14,.25)}
  @keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .slot-opt{padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s ease}
  .slot-opt:hover{border-color:var(--gold);transform:translateX(3px)}
  .slot-opt small{color:var(--muted);font-size:11px}

  /* Trophies */
  .trophies{display:flex;gap:12px;flex-wrap:wrap}
  .trophy{padding:18px;border-radius:14px;background:var(--panel);border:2px solid var(--line);min-width:140px;text-align:center;flex:1;transition:all .25s ease;box-shadow:0 2px 0 var(--line-soft)}
  .trophy.won{background:linear-gradient(160deg,#3a4f25,#2a4520);border-color:var(--gold-bright);box-shadow:0 6px 24px rgba(245,196,81,.4),0 2px 0 var(--gold-deep)}
  .trophy.won .ic{animation:trophyBob 2.5s ease-in-out infinite}
  @keyframes trophyBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-4px) rotate(2deg)}}
  .trophy .ic{font-size:42px;line-height:1}
  .trophy b{display:block;margin-top:8px;font-size:13px;color:var(--ink)}

  .log{font-size:13px;background:var(--bg-alt);border-radius:10px;padding:12px;border:1px solid var(--line);font-family:ui-monospace,Menlo,monospace;line-height:1.7;color:var(--ink)}
  .w{color:var(--green-deep);font-weight:800}
  .l{color:var(--red);font-weight:800}
  hr{border:0;border-top:1px solid var(--line);margin:10px 0}
  a{color:var(--red);text-decoration:none;font-weight:600}

  /* Live match */
  .scoreboard{background:linear-gradient(135deg,var(--panel),var(--panel2));border:2px solid var(--green);border-radius:14px;padding:18px;margin-bottom:14px;position:relative;box-shadow:0 2px 0 var(--line-soft)}
  .scoreboard::before{content:"🏏";position:absolute;top:10px;right:14px;font-size:14px;opacity:.7}
  .sb-teams{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
  .sb-team{flex:1;min-width:160px}
  .sb-team .nm{font-size:13px;color:var(--muted);letter-spacing:.5px;font-weight:800;text-transform:uppercase}
  .sb-team .sc{font-size:32px;font-weight:900;letter-spacing:.5px;font-variant-numeric:tabular-nums;transition:color .2s;color:var(--ink)}
  .sb-team .sc.flash{color:var(--red);animation:flash .4s ease}
  @keyframes flash{0%{transform:scale(1.06);color:var(--gold-deep)}100%{transform:scale(1)}}
  .sb-team .ov{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600}
  .sb-vs{font-size:13px;color:var(--red);letter-spacing:1px;font-weight:900}
  .sb-bar{height:6px;background:var(--panel);border:1px solid var(--line);border-radius:3px;margin-top:10px;overflow:hidden}
  .sb-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .25s ease}

  .commentary{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;height:280px;overflow:auto;font-family:ui-monospace,Menlo,monospace;font-size:13px;line-height:1.7;color:var(--ink)}
  .commentary div{padding:2px 0;animation:cIn .25s ease}
  @keyframes cIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
  .c-4{color:var(--green-deep);font-weight:800}
  .c-6{color:var(--gold-deep);font-weight:900;text-shadow:0 0 6px rgba(212,157,42,.3)}
  .c-W{color:var(--red);font-weight:900;text-shadow:0 0 6px rgba(200,16,46,.25)}
  .c-ov{color:var(--muted);border-top:1px dashed var(--line);margin-top:6px;padding-top:6px;font-style:italic}

  /* Scorecard table */
  .card-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;background:var(--panel);border-radius:8px;overflow:hidden;box-shadow:0 1px 0 var(--line-soft);border:1px solid var(--line)}
  .card-table th{text-align:left;padding:10px 12px;color:#fff;background:var(--green-deep);font-weight:800;font-size:11px;letter-spacing:.7px;text-transform:uppercase}
  .card-table th.r{text-align:right}
  .card-table td{padding:9px 12px;border-bottom:1px solid var(--line-soft);font-variant-numeric:tabular-nums;color:var(--ink)}
  .card-table td.r{text-align:right;font-weight:800}
  .card-table tr:last-child td{border-bottom:0}
  .card-table .out{color:var(--muted);font-size:11px;font-style:italic}

  /* Confetti */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
  .confetti i{position:absolute;width:8px;height:14px;top:-20px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}

  /* Order screen */
  .order-list{display:flex;flex-direction:column;gap:6px}
  .order-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel);border:2px solid var(--line);border-left:5px solid var(--green);border-radius:10px;transition:all .15s ease;box-shadow:0 1px 0 var(--line-soft)}
  .order-row .pos{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#e8f6d6,var(--green) 75%);color:#fff;font-weight:900;font-size:14px;text-align:center;flex-shrink:0;text-shadow:0 1px 2px rgba(0,0,0,.25)}
  .order-row .av{flex-shrink:0}
  .order-row .nm{flex:1;min-width:0}
  .order-row .nm b{display:block;font-size:14px;color:var(--ink);font-weight:800}
  .order-row .nm small{color:var(--muted);font-size:11px}
  .order-row .ctrl{display:flex;gap:4px}
  .order-row .ctrl button{padding:6px 10px;font-size:14px;min-width:36px;line-height:1;background:var(--panel2);box-shadow:none}

  /* Awards */
  .awards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}
  @media(max-width:760px){.awards{grid-template-columns:1fr}}
  .award{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:14px;padding:22px 18px;text-align:center;animation:popIn .5s cubic-bezier(.18,1,.32,1);box-shadow:0 2px 0 var(--line-soft)}
  .award.motm{border-color:var(--gold-bright);background:linear-gradient(160deg,#3a4520,#2a3818);box-shadow:0 8px 32px rgba(245,196,81,.35),0 2px 0 var(--gold-deep)}
  .award .lbl{font-size:10px;color:var(--red);letter-spacing:1.8px;font-weight:900;text-transform:uppercase;margin-bottom:14px}
  .award.motm .lbl{color:var(--gold-deep)}
  .avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:900;color:#fff;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.18);text-shadow:0 1px 2px rgba(0,0,0,.4);border:3px solid #fff}
  .avatar .flag{position:absolute;bottom:-4px;right:-4px;font-size:18px;background:var(--panel);border-radius:50%;padding:0 3px;border:2px solid var(--gold);line-height:1.2}
  .avatar.flag-av{background:transparent;border:0;box-shadow:none;text-shadow:none;line-height:1}
  .ric{width:1.05em;height:1.05em;vertical-align:-0.2em;display:inline-block}
  .ric-ar{width:1.5em}
  .award .nm{font-weight:900;font-size:18px;color:var(--ink);margin-top:8px}
  .award .from{color:var(--muted);font-size:11px;margin:2px 0 8px;font-weight:700}
  .award .fig{font-size:15px;font-weight:800;margin-top:8px;color:var(--ink);background:var(--panel);padding:6px 10px;border-radius:8px;display:inline-block;border:1px solid var(--line)}
  .award.motm .fig{color:var(--gold-deep);background:#fef8e1;border-color:var(--gold-bright)}
  .award .roles{display:flex;gap:4px;justify-content:center;margin-top:8px;flex-wrap:wrap}

  /* Stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px;margin-top:10px}
  .stat-card{background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;box-shadow:0 1px 0 var(--line-soft)}
  .stat-card .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
  .stat-card .h b{font-size:13px;color:var(--ink)}
  .stat-card .h .av-mini{width:28px;height:28px;font-size:11px;flex-shrink:0;border-width:2px}
  .stat-card .h .info{flex:1;min-width:0}
  .stat-card .h small{color:var(--muted);font-size:10px;display:block;font-weight:600}
  .stat-card .stats{display:flex;gap:12px;flex-wrap:wrap;font-variant-numeric:tabular-nums}
  .stat-card .stats span{color:var(--muted);font-size:11px;font-weight:600}
  .stat-card .stats b{color:var(--ink);font-weight:800}
  .stat-card .stats .lbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:5px;align-self:center}
  .stat-card .stats .lbl.bat{background:rgba(90,153,255,.18);color:var(--blue)}
  .stat-card .stats .lbl.bowl{background:rgba(61,220,151,.18);color:var(--green-light)}
  /* Career stats — two compact tables (Batting / Bowling) */
  .st-tbl{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:14px}
  .st-tbl .cap{display:flex;align-items:center;gap:7px;padding:11px 14px 9px;font-size:13px;font-weight:900;letter-spacing:.3px}
  .st-tbl .cap.bat{color:var(--blue)} .st-tbl .cap.bowl{color:var(--green-light)}
  .st-tbl table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  .st-tbl th{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);text-align:right;padding:6px 8px;border-top:1px solid var(--line-soft)}
  .st-tbl th.l{text-align:left}
  .st-tbl td{font-size:13px;padding:7px 8px;text-align:right;border-top:1px solid var(--line-soft);font-weight:700;color:var(--ink)}
  .st-tbl td.l{text-align:left}
  .st-tbl td.l .fl{margin-right:5px}
  .st-tbl td.hi{color:var(--gold);font-weight:900}
  .st-tbl tr:nth-child(even) td{background:rgba(255,255,255,.018)}
  @media(max-width:430px){ .st-tbl th,.st-tbl td{padding:7px 5px;font-size:12px} .st-tbl td.l{font-size:12px} }
  .stat-card.motm-card{border-color:var(--gold-bright);background:var(--panel2)}

  /* Attempt badges */
  .attempts-pill{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;background:var(--panel2);color:var(--gold-deep);border:1px solid var(--gold-bright);margin-left:6px;letter-spacing:.3px}
  .attempts-pill.zero{background:#f8d7da;color:var(--red);border-color:var(--red)}


  /* Hamburger / drawer */
  .hamburger{display:none;position:fixed;top:14px;right:14px;z-index:201;background:var(--panel);border:2px solid var(--green);border-radius:999px;padding:9px 15px;cursor:pointer;font-size:13px;font-weight:800;letter-spacing:.3px;line-height:1;color:var(--ink);box-shadow:0 4px 16px rgba(76,168,80,.25)}
  .hamburger.open{border-color:var(--red);color:var(--red)}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199;backdrop-filter:blur(2px);animation:fadeIn .2s ease}
  @media(max-width:900px){
    .hamburger{display:block}
    .sidebar{position:fixed;top:0;left:-320px;width:290px;height:100vh;z-index:200;transition:left .28s cubic-bezier(.32,.72,.32,1.02);border-right:3px solid var(--green);border-bottom:0;padding-top:60px}
    .sidebar.open{left:0;box-shadow:8px 0 32px rgba(0,0,0,.3)}
    .app{grid-template-columns:1fr}
    .main{padding-top:60px;padding-left:16px;padding-right:16px;padding-bottom:100px}
    .hero h1{font-size:42px}
  }

  /* Live batters/bowler panel */
  .live-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  @media(max-width:520px){.live-info{grid-template-columns:1fr}}
  .live-box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px}
  .live-box .h{color:var(--label);font-size:10px;letter-spacing:1.6px;font-weight:800;text-transform:uppercase;margin-bottom:6px}
  .live-box .p{display:flex;justify-content:space-between;align-items:center;padding:3px 0;gap:8px}
  .live-box .p.on{color:var(--gold-deep);font-weight:800}
  .live-box .p b{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
  .live-box .p .fig{color:var(--muted);font-variant-numeric:tabular-nums;font-size:11px;flex-shrink:0;font-weight:700}
  .live-box .p.on .fig{color:var(--gold-deep)}

  /* Chase tracker */
  .chase-box{background:linear-gradient(135deg,var(--panel2),var(--panel));border:2px solid var(--red);border-radius:12px;padding:12px 16px;margin:10px 0;display:flex;gap:18px;flex-wrap:wrap;justify-content:space-between;align-items:center;box-shadow:0 2px 0 var(--line-soft)}
  .chase-box .it{display:flex;flex-direction:column}
  .chase-box .it small{font-size:10px;color:var(--muted);letter-spacing:1px;font-weight:800;text-transform:uppercase}
  .chase-box .it b{font-size:18px;font-variant-numeric:tabular-nums;color:var(--ink);margin-top:2px;font-weight:900}
  .chase-box .it b.gold{color:var(--gold-deep)}
  .chase-box .it b.red{color:var(--red)}
  .chase-box .it b.green{color:var(--green-deep)}

  /* Watch/skip choice cards */
  .choice-card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:14px;padding:28px 22px;text-align:center;cursor:pointer;transition:all .2s ease;animation:popIn .4s ease;box-shadow:0 2px 0 var(--line-soft)}
  .choice-card:hover{border-color:var(--green);transform:translateY(-3px);box-shadow:0 10px 30px rgba(76,168,80,.18),0 2px 0 var(--green-deep)}
  .choice-card .ic{margin-bottom:14px}
  .choice-card .title{font-size:22px;font-weight:900;margin-bottom:8px;color:var(--ink)}
  .choice-card .desc{color:var(--muted);font-size:13px;line-height:1.5}

  /* Feedback FAB (small icon) */
  .fab-feedback{position:fixed;bottom:14px;right:14px;z-index:150;width:38px;height:38px;border-radius:50%;background:var(--red);color:#fff;border:0;font-size:16px;cursor:pointer;box-shadow:0 4px 12px rgba(200,16,46,.3);display:inline-flex;align-items:center;justify-content:center;padding:0;transition:all .2s ease;opacity:.85}
  .fab-feedback:hover{transform:scale(1.12);opacity:1;color:#fff;box-shadow:0 6px 18px rgba(200,16,46,.5)}

  /* Share button (results) */
  .share-btn{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:0;padding:10px 16px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 2px 0 var(--green-deep);transition:all .15s ease}
  .share-btn:hover{transform:translateY(-1px);box-shadow:0 3px 0 var(--green-deep)}

  /* Share card (hidden, used for export) */
  .share-card{position:fixed;left:-10000px;top:0;width:600px;background:radial-gradient(120% 80% at 50% 0%,#0f3320 0%,#0a2418 55%,#061710 100%);border-radius:28px;overflow:hidden;border:1px solid #1c4a30;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;color:#eaf3e8}
  .share-card .pc-top{display:flex;justify-content:space-between;align-items:center;padding:18px 26px;border-bottom:1px solid rgba(255,255,255,.07)}
  .share-card .pc-wordmark{font-size:19px;font-weight:900;letter-spacing:3px;color:#fff;display:flex;align-items:center;gap:8px}
  .share-card .pc-wordmark .dot{width:9px;height:9px;border-radius:50%;background:#f5c451;box-shadow:0 0 12px #f5c451}
  .share-card .pc-url{font-size:11px;font-weight:700;letter-spacing:1px;color:#8fce9c;text-transform:uppercase}
  .share-card .pc-hero{text-align:center;padding:22px 26px 18px}
  .share-card .pc-badge{display:inline-block;font-size:12px;font-weight:900;letter-spacing:3px;color:#06170f;background:linear-gradient(180deg,#ffd76b,#e3a92a);padding:7px 18px;border-radius:999px;text-transform:uppercase}
  .share-card .pc-trophies{font-size:44px;line-height:1;margin:14px 0 6px;letter-spacing:4px}
  .share-card .pc-team{font-size:38px;font-weight:900;letter-spacing:.5px;color:#fff;line-height:1.05}
  .share-card .pc-stats{display:flex;justify-content:center;margin-top:14px}
  .share-card .pc-stat{padding:0 20px;text-align:center;border-right:1px solid rgba(255,255,255,.12)}
  .share-card .pc-stat:last-child{border-right:0}
  .share-card .pc-stat .v{font-size:24px;font-weight:900;color:#ffd76b}
  .share-card .pc-stat .l{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#7fa98c;text-transform:uppercase;margin-top:2px}
  .share-card .pc-caption{font-size:13px;color:#bcd6c2;font-weight:600;margin-top:14px;line-height:1.5}
  .share-card .pc-xi{margin:2px 22px 0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden}
  .share-card .pc-xi-h{font-size:11px;font-weight:900;letter-spacing:2px;color:#7fa98c;text-transform:uppercase;padding:11px 18px 7px}
  .share-card .pc-row{display:flex;align-items:center;gap:11px;padding:7px 18px;font-size:15px;border-top:1px solid rgba(255,255,255,.05)}
  .share-card .pc-row .n{width:20px;color:#6f9a7d;font-weight:900;font-size:13px;text-align:center}
  .share-card .pc-row .fl{font-size:17px}
  .share-card .pc-row .nm{flex:1;font-weight:700;color:#f3f9f1}
  .share-card .pc-row .yr{font-size:12px;color:#7fa98c;font-weight:700}
  .share-card .pc-row .rt{font-weight:900;color:#fff;width:34px;text-align:right}
  .share-card .pc-row .rt.hi{color:#ffd76b}
  .share-card .pc-cta{display:flex;align-items:center;justify-content:space-between;margin:16px 22px 20px;padding:15px 22px;background:linear-gradient(180deg,#2f9d4f,#1d6e32);border-radius:16px}
  .share-card .pc-cta .t{font-size:13px;font-weight:700;color:#d8f5dd}
  .share-card .pc-cta .u{font-size:18px;font-weight:900;letter-spacing:.5px;color:#fff}

  /* Feedback modal */
  .fb-form{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .fb-form select,.fb-form textarea{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-family:inherit;font-size:13px}
  .fb-form textarea{min-height:120px;resize:vertical}
  .fb-form select:focus,.fb-form textarea:focus{border-color:var(--green);outline:0}
  .fb-status{font-size:12px;margin-top:6px;font-weight:700}
</style>
