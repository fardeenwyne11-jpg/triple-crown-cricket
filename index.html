<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>11-0 — Cricket Squad Draft</title>
<style>
  :root{
    --bg:#0a0e1a; --panel:#11162a; --panel2:#161c38; --line:#252c52;
    --ink:#e7ecff; --muted:#8590bb; --gold:#f5c451; --green:#3ddc97; --red:#ff5d73; --blue:#5aa9ff; --teal:#2dd4bf; --purple:#a578f0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;min-height:100%}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#252c52;border-radius:4px}::-webkit-scrollbar-track{background:transparent}

  .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
  @media(max-width:900px){.app{grid-template-columns:1fr}}
  .sidebar{background:#070b18;border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}
  @media(max-width:900px){.sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}}
  .main{padding:30px 28px;max-width:1100px;margin:0 auto;width:100%}

  h1{font-size:30px;margin:0 0 4px;letter-spacing:.3px}
  h2{font-size:14px;margin:18px 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.4px;font-weight:600}
  h3{font-size:16px;margin:0 0 8px}
  .muted{color:var(--muted)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .pill{background:var(--panel2);padding:5px 10px;border-radius:999px;font-size:11px;color:var(--muted);border:1px solid var(--line);font-weight:600;letter-spacing:.3px}
  .pill.warn{background:rgba(255,93,115,.12);color:var(--red);border-color:var(--red)}
  .pill.ok{background:rgba(61,220,151,.12);color:var(--green);border-color:var(--green)}

  button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);padding:10px 14px;border-radius:10px;font-weight:600;cursor:pointer;font-size:13px;transition:all .15s ease}
  button:hover:not(:disabled){border-color:var(--blue);transform:translateY(-1px)}
  button:active:not(:disabled){transform:translateY(0)}
  button.primary{background:var(--green);color:#053a26;border-color:var(--green)}
  button.gold{background:var(--gold);color:#2a1a00;border-color:var(--gold)}
  button.ghost{background:transparent}
  button:disabled{opacity:.4;cursor:not-allowed}

  .opt{display:inline-block;padding:12px 14px;border:1px solid var(--line);border-radius:10px;cursor:pointer;background:var(--panel);font-size:13px;transition:all .15s ease;text-align:center;font-weight:600;flex:1;min-width:120px}
  .opt:hover{border-color:var(--blue);transform:translateY(-1px)}
  .opt.active{border-color:var(--green);background:rgba(61,220,151,.08);color:var(--green)}
  .opt small{display:block;color:var(--muted);font-size:10px;margin-top:3px;font-weight:400;letter-spacing:.3px}
  .opt.active small{color:var(--green);opacity:.7}
  .opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}

  /* Sidebar squad */
  .squad-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
  .slot{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel);border:1px dashed var(--line);border-radius:8px;font-size:12px;min-height:40px;transition:all .2s ease}
  .slot.filled{border-style:solid;background:var(--panel2);animation:slotIn .35s ease}
  @keyframes slotIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .slot .num{font-size:11px;color:var(--muted);font-weight:800;width:18px;flex-shrink:0;text-align:center}
  .slot.filled .num{color:var(--gold)}
  .slot .name{flex:1;min-width:0;overflow:hidden}
  .slot .name b{display:block;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slot .name small{display:block;color:var(--muted);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slot .rating{font-weight:800;color:var(--gold);font-size:11px}
  .slot .empty{color:#404870;font-style:italic}
  .slot .x{background:transparent;border:0;color:var(--muted);padding:2px 6px;cursor:pointer;font-size:14px}
  .slot .x:hover{color:var(--red);transform:none}

  .role-tally{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;padding:8px;background:var(--panel);border:1px solid var(--line);border-radius:8px}
  .role-tally .t{font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;letter-spacing:.4px}
  .role-tally .t.zero{opacity:.3}
  .wk-warn{margin-top:8px;padding:8px 10px;background:rgba(255,93,115,.1);border:1px solid var(--red);border-radius:8px;font-size:11px;color:var(--red);font-weight:600;text-align:center;animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}

  /* Hero */
  .hero{text-align:center;padding:40px 20px;background:radial-gradient(ellipse at center,#2a3a8a 0%,transparent 60%);border-radius:16px;margin-bottom:24px;animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .hero h1{font-size:56px;letter-spacing:2px;margin-bottom:6px;background:linear-gradient(180deg,#fff,#8aa3ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero p{color:var(--muted);margin:0 0 18px;font-size:15px;max-width:560px;margin:0 auto}

  /* Setup */
  .setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:760px){.setup-grid{grid-template-columns:1fr}}
  .setup-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px}

  /* Spin */
  .spin-box{background:linear-gradient(180deg,#1a2244,var(--panel));border:1px solid var(--line);border-radius:16px;padding:36px 30px;text-align:center;margin:14px 0;position:relative;overflow:hidden}
  .spin-box::before{content:"";position:absolute;inset:-50%;background:radial-gradient(circle at center,rgba(90,169,255,.08),transparent 60%);pointer-events:none}
  .spin-box .lbl{color:var(--muted);font-size:11px;letter-spacing:2px;font-weight:700;margin-bottom:8px}
  .pos-left{color:var(--muted);font-size:13px;margin-bottom:22px}
  .spin-btn{background:var(--green);color:#053a26;border:0;padding:16px 32px;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;letter-spacing:.5px;box-shadow:0 6px 24px rgba(61,220,151,.3);transition:all .2s ease}
  .spin-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(61,220,151,.45)}
  .spin-btn:active{transform:translateY(0)}

  .reel{height:90px;display:block;position:relative;overflow:hidden;margin:8px 0 4px;border-radius:10px}
  .reel-track{display:flex;flex-direction:column;width:100%;will-change:transform}
  .reel-item{height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
  .reel-item .t{font-size:24px;font-weight:800;letter-spacing:.3px}
  .reel-item .y{font-size:20px;font-weight:800;color:var(--gold);margin-top:2px}
  .reel-item .f{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;margin-top:2px}
  .reel.done .reel-item{animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(.85)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

  .trophy-label{font-size:12px;color:var(--gold);margin-top:6px;letter-spacing:.5px;font-weight:600}
  .reroll{font-size:12px;color:var(--muted);margin-top:14px}
  .reroll b{color:var(--gold)}
  .reroll a{color:var(--blue);cursor:pointer;text-decoration:none;font-weight:600}
  .reroll a:hover{text-decoration:underline}

  .picker{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:14px;animation:fadeIn .4s ease}
  .picker .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .picker .head .h{font-size:18px;font-weight:700}
  .picker .head .h .y{color:var(--gold)}

  .player{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;background:#0a1228;border:1px solid transparent;margin-bottom:5px;cursor:pointer;transition:all .15s ease}
  .player:hover{border-color:var(--blue);background:#0f1838;transform:translateX(2px)}
  .player.disabled{opacity:.35;cursor:not-allowed}
  .player.disabled:hover{border-color:transparent;background:#0a1228;transform:none}
  .player.wk-needed{border-color:var(--gold);background:rgba(245,196,81,.06)}
  .player .r{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .r-90{background:linear-gradient(135deg,#f5c451,#d4a435);color:#1a1300}
  .r-85{background:linear-gradient(135deg,#3ddc97,#2eb47a);color:#053a26}
  .r-80{background:linear-gradient(135deg,#5aa9ff,#3a89e0);color:#0a2548}
  .r-75{background:linear-gradient(135deg,#a578f0,#8558d0);color:#fff}
  .r-70{background:linear-gradient(135deg,#ff7e5d,#e05a3a);color:#fff}
  .r-hide{background:#252c52;color:var(--muted)}
  .player .nm{flex:1;min-width:0}
  .player .nm b{display:block;font-size:14px}
  .player .nm small{color:var(--muted);font-size:11px}
  .tags{display:flex;gap:4px;flex-wrap:wrap}
  .tag{font-size:10px;font-weight:700;padding:3px 6px;border-radius:4px;letter-spacing:.4px}
  .t-OPN{background:#3ddc97;color:#053a26}
  .t-BAT{background:#5aa9ff;color:#0a2548}
  .t-WK{background:#f5c451;color:#1a1300}
  .t-AR{background:#a578f0;color:#fff}
  .t-SPN{background:#ff5d73;color:#fff}
  .t-PAC{background:#ff7e5d;color:#fff}
  .t-FIN{background:#2dd4bf;color:#053a36}

  /* Trophies */
  .trophies{display:flex;gap:12px;flex-wrap:wrap}
  .trophy{padding:18px;border-radius:14px;background:var(--panel2);border:1px solid var(--line);min-width:140px;text-align:center;flex:1;transition:all .25s ease}
  .trophy.won{background:linear-gradient(160deg,#3a2a08,#1b2347);border-color:var(--gold);box-shadow:0 6px 24px rgba(245,196,81,.18)}
  .trophy.won .ic{animation:trophyBob 2.5s ease-in-out infinite}
  @keyframes trophyBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-4px) rotate(2deg)}}
  .trophy .ic{font-size:40px;line-height:1}
  .trophy b{display:block;margin-top:8px;font-size:13px}

  .log{font-size:13px;background:#070b18;border-radius:10px;padding:12px;border:1px solid var(--line);font-family:ui-monospace,Menlo,monospace;line-height:1.7}
  .w{color:var(--green);font-weight:700} .l{color:var(--red);font-weight:700}
  hr{border:0;border-top:1px solid var(--line);margin:10px 0}
  a{color:var(--blue);text-decoration:none}

  /* Live match */
  .scoreboard{background:linear-gradient(135deg,#1a2244,#0e1430);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  .sb-teams{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
  .sb-team{flex:1;min-width:160px}
  .sb-team .nm{font-size:13px;color:var(--muted);letter-spacing:.5px;font-weight:600;text-transform:uppercase}
  .sb-team .sc{font-size:32px;font-weight:800;letter-spacing:.5px;font-variant-numeric:tabular-nums;transition:color .2s}
  .sb-team .sc.flash{color:var(--gold);animation:flash .4s ease}
  @keyframes flash{0%{transform:scale(1.06);color:#fff}100%{transform:scale(1)}}
  .sb-team .ov{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .sb-vs{font-size:12px;color:var(--muted);letter-spacing:1px;font-weight:700}
  .sb-bar{height:5px;background:#0a1228;border-radius:3px;margin-top:10px;overflow:hidden}
  .sb-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .25s ease}

  .commentary{background:#070b18;border:1px solid var(--line);border-radius:10px;padding:14px;height:280px;overflow:auto;font-family:ui-monospace,Menlo,monospace;font-size:13px;line-height:1.7}
  .commentary div{padding:2px 0;animation:cIn .25s ease}
  @keyframes cIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
  .c-4{color:var(--green);font-weight:700}
  .c-6{color:var(--gold);font-weight:700}
  .c-W{color:var(--red);font-weight:700}
  .c-ov{color:var(--muted);border-top:1px dashed #252c52;margin-top:6px;padding-top:6px}

  .card-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
  .card-table th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--line)}
  .card-table th.r{text-align:right}
  .card-table td{padding:8px 10px;border-bottom:1px solid #1a2040;font-variant-numeric:tabular-nums}
  .card-table td.r{text-align:right;font-weight:700}
  .card-table tr:last-child td{border-bottom:0}
  .card-table .out{color:var(--muted);font-size:11px}

  .confetti{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
  .confetti i{position:absolute;width:8px;height:14px;top:-20px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}

  /* Order screen */
  .order-list{display:flex;flex-direction:column;gap:6px}
  .order-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;transition:all .15s ease}
  .order-row .pos{font-weight:800;color:var(--gold);width:28px;font-size:16px;text-align:center}
  .order-row .av{flex-shrink:0}
  .order-row .nm{flex:1;min-width:0}
  .order-row .nm b{display:block;font-size:14px}
  .order-row .nm small{color:var(--muted);font-size:11px}
  .order-row .ctrl{display:flex;gap:4px}
  .order-row .ctrl button{padding:6px 10px;font-size:14px;min-width:36px;line-height:1}

  /* Awards */
  .awards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}
  @media(max-width:760px){.awards{grid-template-columns:1fr}}
  .award{background:linear-gradient(160deg,#1a2244,#11162a);border:1px solid var(--line);border-radius:14px;padding:22px 18px;text-align:center;animation:popIn .5s cubic-bezier(.18,1,.32,1)}
  .award.motm{border-color:var(--gold);background:linear-gradient(160deg,#3a2a08,#1b2347);box-shadow:0 8px 32px rgba(245,196,81,.22)}
  @keyframes popIn{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  .award .lbl{font-size:10px;color:var(--muted);letter-spacing:1.8px;font-weight:800;text-transform:uppercase;margin-bottom:14px}
  .award.motm .lbl{color:var(--gold)}
  .avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#fff;position:relative;box-shadow:0 6px 20px rgba(0,0,0,.4);text-shadow:0 1px 3px rgba(0,0,0,.5)}
  .avatar .flag{position:absolute;bottom:-4px;right:-4px;font-size:18px;background:#0a0e1a;border-radius:50%;padding:0 3px;border:2px solid #161c38;line-height:1.2}
  .award .nm{font-weight:800;font-size:17px;margin-top:6px}
  .award .from{color:var(--muted);font-size:11px;margin:2px 0 8px}
  .award .fig{font-size:15px;font-weight:700;margin-top:8px;color:var(--ink);background:rgba(255,255,255,.04);padding:6px 10px;border-radius:8px;display:inline-block}
  .award.motm .fig{color:var(--gold);background:rgba(245,196,81,.1)}
  .award .roles{display:flex;gap:4px;justify-content:center;margin-top:8px}

  /* Player career stats */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px;margin-top:10px}
  .stat-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px}
  .stat-card .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
  .stat-card .h b{font-size:13px}
  .stat-card .h .av-mini{width:28px;height:28px;font-size:11px;flex-shrink:0}
  .stat-card .h .info{flex:1;min-width:0}
  .stat-card .h small{color:var(--muted);font-size:10px;display:block}
  .stat-card .stats{display:flex;gap:12px;flex-wrap:wrap;font-variant-numeric:tabular-nums}
  .stat-card .stats span{color:var(--muted);font-size:11px}
  .stat-card .stats b{color:var(--ink);font-weight:700}
  .stat-card.motm-card{border-color:var(--gold)}

  /* Attempt badges */
  .attempts-pill{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:800;background:rgba(245,196,81,.12);color:var(--gold);border:1px solid var(--gold);margin-left:6px;letter-spacing:.3px}
  .attempts-pill.zero{background:rgba(255,93,115,.15);color:var(--red);border-color:var(--red)}

  /* Hearts (lives) */
  .lives{display:inline-flex;gap:4px;align-items:center}
  .heart{font-size:18px;line-height:1;animation:beat 1.4s ease-in-out infinite}
  .heart.lost{opacity:.18;animation:none}
  @keyframes beat{0%,100%{transform:scale(1)}30%{transform:scale(1.15)}}

  /* Hamburger + drawer (mobile only) */
  .hamburger{display:none;position:fixed;top:14px;right:14px;z-index:201;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:18px;line-height:1;color:var(--ink);box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;backdrop-filter:blur(3px);animation:fadeIn .2s ease}
  @media(max-width:900px){
    .hamburger{display:block}
    .sidebar{position:fixed;top:0;left:-320px;width:290px;height:100vh;z-index:200;transition:left .28s cubic-bezier(.32,.72,.32,1.02);border-right:1px solid var(--line);border-bottom:0;padding-top:60px}
    .sidebar.open{left:0;box-shadow:8px 0 32px rgba(0,0,0,.6)}
    .app{grid-template-columns:1fr}
    .main{padding-top:60px;padding-left:16px;padding-right:16px}
    .hero h1{font-size:42px}
  }

  /* Live current batters / bowler panel */
  .live-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  @media(max-width:520px){.live-info{grid-template-columns:1fr}}
  .live-box{background:#0a1228;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px}
  .live-box .h{color:var(--muted);font-size:10px;letter-spacing:1px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
  .live-box .p{display:flex;justify-content:space-between;align-items:center;padding:3px 0;gap:8px}
  .live-box .p.on{color:var(--gold);font-weight:700}
  .live-box .p b{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .live-box .p .fig{color:var(--muted);font-variant-numeric:tabular-nums;font-size:11px;flex-shrink:0}
  .live-box .p.on .fig{color:var(--gold)}

  /* Game over */
  .gameover{text-align:center;padding:50px 20px;background:radial-gradient(ellipse at center,rgba(255,93,115,.18) 0%,transparent 60%);border-radius:16px;border:1px solid rgba(255,93,115,.4)}
  .gameover h1{font-size:48px;color:var(--red);letter-spacing:2px;margin-bottom:10px}
  .gameover p{color:var(--muted);margin:0 0 18px;font-size:15px}

  .tour-diff{display:inline-flex;background:#0a1228;border:1px solid var(--line);border-radius:8px;padding:2px;margin-left:8px}
  .tour-diff button{padding:4px 10px;font-size:11px;border:0;background:transparent;border-radius:5px;color:var(--muted);font-weight:700;cursor:pointer}
  .tour-diff button.active{background:var(--blue);color:#fff}

  /* ============ CRICKET THEME ============ */
  :root{
    --cherry:#a4222f;
    --cherry-light:#d65766;
    --pitch:#2d7a4d;
    --pitch-dark:#1a4d2e;
    --willow:#c8a165;
    --boundary:#fff8e1;
  }

  /* Hero — willow-gold title + pitch stripes at the bottom */
  .hero{
    background:
      linear-gradient(180deg,rgba(45,122,77,.12),transparent 60%),
      radial-gradient(ellipse at center,#2a3a8a 0%,transparent 60%);
    position:relative;overflow:hidden
  }
  .hero::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
    background:repeating-linear-gradient(90deg,var(--pitch-dark) 0,var(--pitch-dark) 12px,var(--pitch) 12px,var(--pitch) 24px);
    opacity:.55
  }
  .hero h1{
    background:linear-gradient(180deg,#fff8e1 0%,var(--willow) 90%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 8px rgba(200,161,101,.2))
  }

  /* Cricket ball — Spin button */
  .spin-btn{
    background:radial-gradient(circle at 30% 28%,#e5777f 0%,#c8102e 50%,#7a0a18 100%);
    color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);
    box-shadow:
      0 8px 28px rgba(200,16,46,.45),
      inset 0 -4px 12px rgba(0,0,0,.4),
      inset 0 3px 6px rgba(255,255,255,.22);
    position:relative;border-radius:14px
  }
  .spin-btn::before,.spin-btn::after{
    content:"";position:absolute;left:14%;right:14%;height:2px;
    background:linear-gradient(90deg,transparent 0%,var(--boundary) 18%,var(--boundary) 82%,transparent 100%);
    opacity:.55;border-radius:1px;pointer-events:none
  }
  .spin-btn::before{top:34%}
  .spin-btn::after{bottom:34%}
  .spin-btn:hover{box-shadow:0 12px 36px rgba(200,16,46,.55),inset 0 -4px 12px rgba(0,0,0,.4),inset 0 3px 6px rgba(255,255,255,.22)}

  /* Lives = cherry-red cricket balls */
  .lives{display:inline-flex;gap:5px;align-items:center}
  .heart{
    display:inline-block;width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 32% 28%,#e5777f 0%,#c8102e 55%,#7a0a18 100%);
    box-shadow:inset 0 -2px 3px rgba(0,0,0,.4), 0 0 0 1px rgba(0,0,0,.3), 0 2px 4px rgba(200,16,46,.3);
    position:relative;font-size:0;color:transparent;
    animation:beat 1.6s ease-in-out infinite;
  }
  .heart::before,.heart::after{
    content:"";position:absolute;left:18%;right:18%;height:1px;
    background:var(--boundary);opacity:.7;border-radius:1px
  }
  .heart::before{top:42%}
  .heart::after{top:58%}
  .heart.lost{background:#2a2f4a;animation:none;opacity:.35;box-shadow:none}
  .heart.lost::before,.heart.lost::after{display:none}

  /* Scoreboard with cricket bat decoration */
  .scoreboard{
    background:
      linear-gradient(135deg,rgba(45,122,77,.14),rgba(26,77,46,.06)),
      linear-gradient(135deg,#1a2244,#0e1430);
    position:relative
  }
  .scoreboard::before{
    content:"🏏";position:absolute;top:10px;right:14px;font-size:14px;opacity:.35
  }

  /* Trophies with willow gleam */
  .trophy.won{
    background:linear-gradient(160deg,#3a2a08,#1b2347);
    border-color:var(--gold);
    box-shadow:0 6px 24px rgba(245,196,81,.22),inset 0 0 0 1px rgba(255,248,225,.08)
  }

  /* Sidebar header with cricket bat */
  .sidebar > div:first-child b::before{content:"🏏 ";font-size:12px}

  /* Watch/skip choice cards */
  .choice-card{
    background:linear-gradient(160deg,#1a2244,#11162a);
    border:1px solid var(--line);border-radius:14px;padding:28px 22px;
    text-align:center;cursor:pointer;transition:all .2s ease;
    animation:popIn .4s ease
  }
  .choice-card:hover{border-color:var(--cherry-light);transform:translateY(-3px);box-shadow:0 10px 30px rgba(200,16,46,.18)}
  .choice-card .ic{margin-bottom:14px}
  .choice-card .title{font-size:22px;font-weight:800;margin-bottom:8px;

  .choice-card .desc{color:var(--muted);font-size:13px;line-height:1.5}

  .order-row{
    background:linear-gradient(180deg,#161c38,#11162a);
    border-left:3px solid var(--pitch)
  }

  }

  /* Spin box with subtle grass tint */
  .spin-box{
    background:
      linear-gradient(135deg,rgba(45,122,77,.04),transparent 60%),

  }

  .gameover h1{background:linear-gradient(180deg,#ff8a9b,#a4222f);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .gameover::before{content:"";display:block;font-size:80px;margin-bottom:6px;line-height:1}

  /* Commentary cherry-red highlight for sixes/fours */
  .c-6{color:var(--gold);text-shadow:0 0 8px rgba(245,196,81,.4)}
  .c-W{color:var(--cherry-light);text-shadow:0 0 6px rgba(212,87,102,.3)}

/* =========== HELPERS =========== */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function ratingOf(p){ return S.setup.primeMode ? p.prime : p.season; }
function ratingClass(r){ if(r>=90)return"r-90"; if(r>=85)return"r-85"; if(r>=80)return"r-80"; if(r>=75)return"r-75"; return"r-70"; }
function filteredSeasons(){ return TEAM_SEASONS.map((t,i)=>({...t,_i:i})).filter(t => t.year >= S.setup.eraMin && t.year <= S.setup.eraMax); }
function squadFull(){ return S.squad.every(s => s.player); }
function squadPicks(){ return S.squad.filter(s => s.player); }
function alreadyPicked(name){ return S.squad.some(s => s.player && s.player.n === name); }
function hasKeeper(){ return S.squad.some(s => s.player && s.player.roles.includes("WK")); }
function picksRemaining(){ return SQUAD_SIZE - squadPicks().length; }
function batSkill(p){ const r=ratingOf(p), rs=p.roles; if(rs.includes("OPN")||rs.includes("BAT")||rs.includes("FIN")||rs.includes("WK"))return r; if(rs.includes("AR"))return r*0.78; return r*0.32; }
function bowlSkill(p){ const r=ratingOf(p), rs=p.roles; if(rs.includes("PAC")||rs.includes("SPN"))return r; if(rs.includes("AR"))return r*0.82; return 0; }
function isKeeper(p){ return p.roles.includes("WK"); }
function isBowler(p){ return p.roles.includes("PAC")||p.roles.includes("SPN")||p.roles.includes("AR"); }
function roleTally(){
  const t = {OPN:0,BAT:0,WK:0,AR:0,SPN:0,PAC:0,FIN:0};
  squadPicks().forEach(s => s.player.roles.forEach(r => t[r]++));
  return t;
}

function ensurePlayerStat(name){
  if (!S.playerStats[name]) S.playerStats[name] = {
    matches:0, runs:0, balls:0, fours:0, sixes:0,
    wickets:0, ballsBowled:0, runsConceded:0, maidens:0, motm:0
  };
  return S.playerStats[name];
}
function updatePlayerStats(match){
  match.innings.forEach(inn => {
    if (inn.batTeam === "You"){
      inn.batCard.forEach(b => {
        if (b.balls > 0 || b.out){
          const st = ensurePlayerStat(b.n);
          st.runs += b.runs; st.balls += b.balls;
          st.fours += b.fours; st.sixes += b.sixes;
        }
      });
    }
    if (inn.bowlTeam === "You"){
      inn.bowlCard.forEach(b => {
        if (b.balls > 0){
          const st = ensurePlayerStat(b.n);
          st.wickets += b.wickets; st.ballsBowled += b.balls;
          st.runsConceded += b.runs; st.maidens += b.maidens;
        }
      });
    }
  });
  squadPicks().forEach(s => ensurePlayerStat(s.player.n).matches++);
}
function computeAwards(match){
  const allBat = [], allBowl = [];
  match.innings.forEach(inn => {
    inn.batCard.forEach(b => { if (b.balls>0 || b.out) allBat.push({...b, team: inn.batTeam}); });
    inn.bowlCard.forEach(b => { if (b.balls>0) allBowl.push({...b, team: inn.bowlTeam}); });
  });
  const bestBat = allBat.slice().sort((a,b)=>b.runs-a.runs)[0];
  const bestBowl = allBowl.slice().sort((a,b)=>{
    if (b.wickets!==a.wickets) return b.wickets-a.wickets;
    const ea = a.balls?a.runs/(a.balls/6):99, eb = b.balls?b.runs/(b.balls/6):99;
    return ea-eb;
  })[0];
  const score = (b)=>(b.runs||0) + (b.wickets||0)*25 + ((b.fours||0)+(b.sixes||0))*2;
  const winningTeam = match.won ? "You" : match.opp;
  const all = {};
  allBat.forEach(b=>{ all[b.n] = { n:b.n, team:b.team, roles:b.roles||[], runs:b.runs, balls:b.balls, fours:b.fours, sixes:b.sixes, wickets:0, ovBalls:0, runsConceded:0, batScore:score(b), bowlScore:0 }; });
  allBowl.forEach(b=>{
    if (all[b.n]){ all[b.n].wickets=b.wickets; all[b.n].ovBalls=b.balls; all[b.n].runsConceded=b.runs; all[b.n].bowlScore=score(b); }
    else all[b.n] = { n:b.n, team:b.team, roles:b.roles||[], runs:0, balls:0, fours:0, sixes:0, wickets:b.wickets, ovBalls:b.balls, runsConceded:b.runs, batScore:0, bowlScore:score(b) };
  });
  const list = Object.values(all).map(p=>({...p, total:p.batScore+p.bowlScore, isWin:p.team===winningTeam}));
  list.sort((a,b)=>{ if (a.isWin!==b.isWin) return a.isWin?-1:1; return b.total-a.total; });
  return { motm: list[0], bestBat, bestBowl };
}
function findPlayerObj(name){

    if (p) return { ...p, from:{ team, year:"All-time" } };

}

function startDraft(){

  const lives = d==="easy"?3 : d==="hard"?1 : 2;

  S.trophies = { wtc:false, odi:false, t20:false };

function spin(){
  const pool = filteredSeasons();
  if (!pool.length) return;
  const finalIdx = pool[Math.floor(Math.random()*pool.length)]._i;
  S.spinning = true;
  S.currentSpin = { teamSeasonIdx: finalIdx, anim:true };
  render();
  animateSpin(finalIdx);
}
function animateSpin(finalIdx){
  const pool = filteredSeasons();
  const reel = document.querySelector(".reel-track");
  if (!reel) return;
  const items = [];
  const N = 24;
  for (let i=0;i<N-1;i++) items.push(pool[Math.floor(Math.random()*pool.length)]._i);
  items.push(finalIdx);
  reel.innerHTML = items.map(i=>{
    const ts = TEAM_SEASONS[i];
    return `<div class="reel-item"><div class="t">${ts.team}</div><div class="y">${ts.year}</div><div class="f">${ts.fmt.toUpperCase()} WC</div></div>`;
  }).join("");
  const totalY = (N-1)*90;
  const duration = 2400;
  const start = performance.now();
  function frame(t){
    const e = Math.min(1, (t-start)/duration);
    const eased = 1 - Math.pow(1-e, 3.2);
    reel.style.transform = `translateY(${-totalY*eased}px)`;
    if (e < 1) requestAnimationFrame(frame);
    else {
      S.spinning = false;
      S.currentSpin.anim = false;
      document.querySelector(".reel")?.classList.add("done");
      render();
    }
  }
  requestAnimationFrame(frame);
}
function reroll(){ if (S.rerollsLeft <= 0) return; S.rerollsLeft--; spin(); }
function choosePlayer(playerName){
  const ts = TEAM_SEASONS[S.currentSpin.teamSeasonIdx];
  const player = ts.squad.find(p=>p.n===playerName);
  if (!player || alreadyPicked(player.n)) return;
  // WK enforcement: at last pick, must be a WK if none yet
  if (picksRemaining() === 1 && !hasKeeper() && !player.roles.includes("WK")) return;
  const emptySlot = S.squad.find(s => !s.player);
  if (!emptySlot) return;
  emptySlot.player = { ...player, from: { team: ts.team, year: ts.year, fmt: ts.fmt } };
  S.currentSpin = null;
  if (squadFull()) S.screen = "hub";
  save(); render();
}

function startTournament(tId){
  if (S.trophies[tId]) return;
  if (S.lives <= 0) { S.screen = "gameover"; save(); render(); return; }
  const t = TOURNAMENTS.find(x=>x.id===tId);
  // WTC restricted to established Test-playing nations
  let pool = OPPONENTS;
  if (tId === "wtc") pool = OPPONENTS.filter(o => TEST_NATIONS.includes(o.n));
  // Opponent difficulty modifier
  const mod = S.setup.oppDifficulty === "easy" ? -8 : S.setup.oppDifficulty === "legend" ? +4 : 0;
  let candidates = pool.map(o=>({ n:o.n, r: Math.max(60, Math.min(98, o[t.fmt] + mod)) }));
  // For WTC final, pick a strong opponent (top 4 by rating)
  if (tId === "wtc"){
    candidates = candidates.sort((a,b)=>b.r-a.r).slice(0,4);
  }
  const opps = shuffle(candidates).slice(0, t.rounds.length).sort((a,b)=>a.r-b.r);
  const auto = orderForBatting(squadPicks().map(s=>s.player)).map(p=>p.n);
  S.tour = { tId, fmt:t.fmt, roundIdx:0, opps, scorecards:[], live:false, speed:2, battingOrder: auto };
  S.screen = "order";
  save(); render();
}
function moveOrder(idx, dir){
  if (!S.tour) return;
  const ord = S.tour.battingOrder;
  const j = idx + dir;
  if (j < 0 || j >= ord.length) return;
  [ord[idx], ord[j]] = [ord[j], ord[idx]];
  render();
}
function buildMatchForCurrent(){
  const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
  const opp = S.tour.opps[S.tour.roundIdx];
  const byName = {};
  squadPicks().forEach(s=>{ byName[s.player.n] = s.player; });
  const players = S.tour.battingOrder.map(n => byName[n]).filter(Boolean);
  return simulateMatch(t, players, opp);
}
function startMatch(){
  const match = buildMatchForCurrent();
  S.tour.currentMatch = match;
  S.tour.live = true;
  S.screen = "live";
  render();
  animateInnings(match, 0);
}
function startMatchSkip(){
  const match = buildMatchForCurrent();

}

function simulateMatch(t, myPlayers, opp){
  const my = myPlayers.slice();
  const myBat = my.slice(); // user-defined batting order
  const myBowl = my.filter(isBowler).sort((a,b)=>bowlSkill(b)-bowlSkill(a)).slice(0,6);
  if (myBowl.length < 4){
    const tail = my.filter(p=>!myBowl.includes(p)).sort((a,b)=>ratingOf(a)-ratingOf(b)).slice(0,4-myBowl.length);
    tail.forEach(p=>myBowl.push(p));
  }
  const oppPlayers = buildOppXI(opp);
  const oppBat = orderForBatting(oppPlayers);
  const oppBowl = oppPlayers.filter(p => p.roles.includes("PAC")||p.roles.includes("SPN")||p.roles.includes("AR")).slice(0,6);

  const tossWin = Math.random() < 0.5 ? "me" : "opp";
  const tossDecision = (Math.random()<0.5?"bat":"bowl");
  let firstBatTeam = (tossWin === "me" ? (tossDecision === "bat" ? "me":"opp") : (tossDecision === "bat" ? "opp":"me"));
  const meBatFirst = firstBatTeam === "me";

  const myR = avg(my.map(p=>ratingOf(p)));
  const oppR = opp.r;

  // Helper to build innings config for a given side
  const cfgFirst = () => ({
    fmt:t.fmt, overs:t.overs, base:t.base,
    bat: meBatFirst?myBat:oppBat, bowl: meBatFirst?oppBowl:myBowl,
    batTeam: meBatFirst?"You":opp.n, bowlTeam: meBatFirst?opp.n:"You",
    batRating: meBatFirst?myR:oppR, bowlRating: meBatFirst?oppR:myR
  });
  const cfgSecond = (chasing) => ({
    fmt:t.fmt, overs:t.overs, base:t.base, chasing,
    bat: meBatFirst?oppBat:myBat, bowl: meBatFirst?myBowl:oppBowl,
    batTeam: meBatFirst?opp.n:"You", bowlTeam: meBatFirst?"You":opp.n,
    batRating: meBatFirst?oppR:myR, bowlRating: meBatFirst?myR:oppR
  });

  if (t.fmt === "wtc"){
    // 4-innings Test match
    const innA1 = simInnings(cfgFirst());
    const innB1 = simInnings(cfgSecond());            // no chase in 1st innings of B
    // Reset chasing for innB1 — pass cfgSecond without chasing
    // Actually we passed undefined-> ok
    // 2nd innings of A (no chase)
    const innA2 = simInnings(cfgFirst());
    const target = innA1.runs + innA2.runs - innB1.runs + 1;
    const innB2 = simInnings(cfgSecond(target));
    let won;
    if (target <= 0) {
      // A leads by negative => B already won by innings, but we still play out
      won = !meBatFirst;
    } else if (innB2.runs >= target) {
      won = !meBatFirst; // chaser won
    } else {
      won = meBatFirst; // first-bat team won
    }
    return { opp:opp.n, format:t.fmt, overs:t.overs,
      toss:{ winner: tossWin==="me"?"You":opp.n, decision: tossDecision },
      firstBatTeam:meBatFirst?"You":opp.n, target,
      innings:[innA1, innB1, innA2, innB2], won };
  }

  // Limited-overs: 2 innings
  const inn1 = simInnings(cfgFirst());
  const target = inn1.runs + 1;
  const inn2 = simInnings(cfgSecond(target));
  let won;
  if (inn2.runs >= target) won = !meBatFirst;
  else won = meBatFirst;
  return { opp:opp.n, format:t.fmt, overs:t.overs,
    toss:{ winner: tossWin==="me"?"You":opp.n, decision: tossDecision },
    firstBatTeam:meBatFirst?"You":opp.n, target,
    innings:[inn1, inn2], won };
}

function orderForBatting(players){
  const openers = players.filter(p=>p.roles.includes("OPN")).sort((a,b)=>ratingOf(b)-ratingOf(a)).slice(0,2);
  let rest = players.filter(p=>!openers.includes(p));
  const mids = rest.filter(p=>p.roles.includes("BAT")&&!p.roles.includes("AR")).sort((a,b)=>ratingOf(b)-ratingOf(a));
  rest = rest.filter(p=>!mids.includes(p));
  const keepers = rest.filter(isKeeper);
  rest = rest.filter(p=>!keepers.includes(p));
  const fin = rest.filter(p=>p.roles.includes("FIN"));
  rest = rest.filter(p=>!fin.includes(p));
  const ars = rest.filter(p=>p.roles.includes("AR"));
  rest = rest.filter(p=>!ars.includes(p));
  return [...openers, ...mids, ...keepers, ...fin, ...ars, ...rest];
}

function buildOppXI(opp){ return (OPP_XI[opp.n] || []).slice(); }
function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length; }

function simInnings({fmt, overs, base, bat, bowl, batTeam, bowlTeam, batRating, bowlRating, chasing}){
  const batCard = bat.map(p=>({ n:p.n, roles:p.roles, r:ratingOf(p), runs:0, balls:0, fours:0, sixes:0, out:false, dismissal:null }));
  const bowlCard = bowl.map(p=>({ n:p.n, roles:p.roles, r:ratingOf(p), overs:0, balls:0, runs:0, wickets:0, maidens:0 }));
  let runs=0, wickets=0, ballNo=0;
  let strikerIdx=0, nonStrikerIdx=1, nextBat=2;
  const events = [];

  const isTest = fmt === "wtc";
  const maxScore = fmt==="t20" ? 250 : fmt==="odi" ? 350 : 520;
  const expectedTotal = Math.min(maxScore, base * Math.pow(batRating/85, 1.0) * Math.pow(85/bowlRating, 0.6));
  const runRate = expectedTotal / overs;
  const maxOversPerBowler = fmt==="t20" ? 4 : fmt==="odi" ? 10 : 30;
  let bowlerIdx = 0;
  function nextBowler(prev){
    let tries=0;
    do { bowlerIdx = (bowlerIdx+1) % bowlCard.length; tries++; }
    while ((bowlCard[bowlerIdx].overs >= maxOversPerBowler || bowlerIdx === prev) && tries < bowlCard.length*2);
    return bowlerIdx;
  }
  let lastBowler = -1;

  function bowlerFigsStr(bw){
    const ov = Math.floor(bw.balls/6)+'.'+(bw.balls%6);
    return `${bw.wickets}/${bw.runs} (${ov})`;
  }

  outer:
  for (let ov=0; ov<overs; ov++){
    const curBowler = nextBowler(lastBowler);
    lastBowler = curBowler;
    const bw = bowlCard[curBowler];
    let overRuns = 0;
    for (let b=0; b<6; b++){
      ballNo++;
      const striker = batCard[strikerIdx];
      const nonStriker = batCard[nonStrikerIdx];
      striker.balls++; bw.balls++;
      const batSkillVal = striker.r * (striker.roles.includes("FIN") && fmt==="t20" ? 1.08 : 1);
      const bowlSkillVal = bw.r;
      const diff = batSkillVal - bowlSkillVal;
      // Format-specific probabilities — Test = much higher dot rate, lower boundaries
      const wktBase = isTest ? 0.022 : fmt==="t20" ? 0.045 : 0.04;
      const wktProb = Math.max(0.005, Math.min(0.18, wktBase - diff*0.0015 + (wickets>=7?0.03:0)));
      const sixP  = isTest ? Math.max(0.003, 0.005+diff*0.0008)
                   : Math.max(0.02, Math.min(0.20, 0.05 + diff*0.003 + (fmt==="t20"?0.06:0.02)));
      const fourP = isTest ? Math.max(0.04, 0.07+diff*0.002)
                   : Math.max(0.05, Math.min(0.28, 0.10 + diff*0.0025 + (fmt==="t20"?0.05:0.02)));
      const twoP  = isTest ? 0.05 : 0.10;
      const oneP  = isTest ? 0.22 : fmt==="t20" ? 0.30 : 0.36;
      const roll = Math.random();
      let evt;
      if (roll < wktProb) evt = "W";
      else {
        const r2 = Math.random();
        let cum = sixP;
        if (r2 < cum) evt = "6";
        else if (r2 < (cum+=fourP)) evt = "4";
        else if (r2 < (cum+=twoP)) evt = "2";
        else if (r2 < (cum+=oneP)) evt = "1";
        else evt = "0";
      }
      // Cap: as score approaches maxScore, stop boundaries
      if (evt !== "W" && runs >= maxScore - 4){
        if (evt === "6" || evt === "4") evt = Math.random()<0.5 ? "1" : "0";
      }
      if (chasing){
        const need = chasing - runs;
        const ballsLeft = (overs*6) - ballNo;
        const rrr = need / (ballsLeft/6);
        if (rrr > runRate * 1.4) {
          if (evt === "0" && Math.random() < 0.35) evt = (Math.random()<0.4?"4":"1");
          if (Math.random() < 0.04) evt = "W";
        }
      }
      // Build event with full context
      const ctxBase = { striker: striker.n, nonStriker: nonStriker?nonStriker.n:null,
                        bowler: bw.n,
                        strikerR: striker.runs, strikerB: striker.balls,
                        nsR: nonStriker?nonStriker.runs:0, nsB: nonStriker?nonStriker.balls:0,
                        bowlerFigs: bowlerFigsStr(bw) };
      if (evt === "W"){
        wickets++;
        striker.out = true; striker.dismissal = `b ${lastName(bw.n)}`;
        bw.wickets++;
        const txt = fmtCommentary(ov, b+1, "wicket", { striker:striker.n, bowler:bw.n, dismissal:striker.dismissal, strikerRuns:striker.runs });
        events.push({ ov, b:b+1, txt, k:"W", runs, wkts:wickets, ...ctxBase, bowlerFigs: bowlerFigsStr(bw) });
        if (nextBat < batCard.length){ strikerIdx = nextBat; nextBat++; }
        else { events.push({ ov, b:b+1, txt:`All out · ${runs}/${wickets}`, k:"end" }); break outer; }
      } else {
        const r = parseInt(evt,10);
        striker.runs += r; runs += r; bw.runs += r; overRuns += r;
        if (r===4) striker.fours++;
        if (r===6) striker.sixes++;
        const ctx = { striker:striker.n, bowler:bw.n, strikerRuns:striker.runs };
        let kind = "dot"; if (r===6) kind="six"; else if (r===4) kind="four"; else if (r===3) kind="three"; else if (r===2) kind="two"; else if (r===1) kind="one";
        const txt = fmtCommentary(ov, b+1, kind, ctx);
        events.push({ ov, b:b+1, txt, k:evt, runs, wkts:wickets, ...ctxBase,
                      strikerR: striker.runs, strikerB: striker.balls,
                      bowlerFigs: bowlerFigsStr(bw) });
        if (r % 2 === 1) [strikerIdx, nonStrikerIdx] = [nonStrikerIdx, strikerIdx];
      }
      if (chasing && runs >= chasing) {
        events.push({ ov, b:b+1, txt:`Target reached! ${runs}/${wickets} in ${ov}.${b+1}`, k:"end", runs, wkts:wickets });
        bw.overs += (b+1)/6;
        return { runs, wickets, overs:`${ov}.${b+1}`, batCard, bowlCard, events, batTeam, bowlTeam };
      }
    }
    bw.overs += 1;
    if (overRuns === 0) bw.maidens++;
    [strikerIdx, nonStrikerIdx] = [nonStrikerIdx, strikerIdx];
    events.push({ ov:ov+1, b:0, k:"ov", txt:`End over ${ov+1}: ${runs}/${wickets} · ${(runs/(ov+1)).toFixed(2)} RR`, runs, wkts:wickets });
  }
  return { runs, wickets, overs:`${overs}.0`, batCard, bowlCard, events, batTeam, bowlTeam };
}

/* =========== ANIM =========== */
function animateInnings(match, innIdx){
  S.tour.currentInn = innIdx;
  S.tour.evtIdx = 0;
  S.tour.liveRuns = 0; S.tour.liveWkts = 0; S.tour.liveOver = "0.0";
  S.tour.liveStriker = null; S.tour.liveBowler = null;
  render();
  step();
  function step(){
    if (!S.tour || S.screen !== "live") return;
    const inn = match.innings[innIdx];
    const ev = inn.events[S.tour.evtIdx];
    if (!ev){
      if (innIdx < match.innings.length - 1)
        animTimer = setTimeout(()=>animateInnings(match, innIdx+1), 1100);
      else endMatch(match);
      return;
    }
    if (ev.runs !== undefined){ S.tour.liveRuns = ev.runs; S.tour.liveWkts = ev.wkts; }
    if (ev.k === "ov" || ev.k === "end") S.tour.liveOver = `${ev.ov}.0`;
    else S.tour.liveOver = `${ev.ov}.${ev.b}`;
    if (ev.striker){
      S.tour.liveStriker = ev.striker;
      S.tour.liveNonStriker = ev.nonStriker;
      S.tour.liveBowler = ev.bowler;
      S.tour.liveStrikerR = ev.strikerR; S.tour.liveStrikerB = ev.strikerB;
      S.tour.liveNSR = ev.nsR; S.tour.liveNSB = ev.nsB;
      S.tour.liveBowlerFigs = ev.bowlerFigs;
    }
    appendCommentary(ev);
    flashScore();
    S.tour.evtIdx++;
    const delay = ev.k==="W"?420 : (ev.k==="6"||ev.k==="4"?280 : ev.k==="ov"?180 : 95);
    animTimer = setTimeout(step, delay/(S.tour.speed||2));
  }
}
function appendCommentary(ev){
  const box = document.getElementById("commentary");
  if (!box) return;
  const d = document.createElement("div");
  d.className = ev.k==="ov" ? "c-ov" : (ev.k==="W" ? "c-W" : (ev.k==="6"?"c-6":(ev.k==="4"?"c-4":"")));
  d.textContent = ev.txt;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}
function flashScore(){
  const sc = document.querySelector(".sb-team.batting .sc");
  if (sc){ sc.classList.add("flash"); setTimeout(()=>sc.classList.remove("flash"),400); }
  const bar = document.querySelector(".sb-bar > i");
  if (bar && S.tour.currentMatch){
    const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
    const totalBalls = t.overs*6;
    const [ovs,bs] = S.tour.liveOver.split(".").map(Number);
    bar.style.width = `${Math.min(100,(ovs*6+bs)/totalBalls*100)}%`;
  }
  const sbTeam = document.querySelector(".sb-team.batting");
  if (sbTeam){
    sbTeam.querySelector(".sc").textContent = `${S.tour.liveRuns}/${S.tour.liveWkts}`;
    sbTeam.querySelector(".ov").textContent = `${S.tour.liveOver} overs`;
  }
  // Update live batters/bowler panel
  if (S.tour.liveStriker){
    const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    setT("liveStriker", S.tour.liveStriker + "*");
    setT("liveStrikerFig", `${S.tour.liveStrikerR||0}(${S.tour.liveStrikerB||0})`);
    setT("liveNonStriker", S.tour.liveNonStriker || "—");
    setT("liveNSFig", `${S.tour.liveNSR||0}(${S.tour.liveNSB||0})`);
    setT("liveBowler", S.tour.liveBowler || "—");
    setT("liveBowlerFig", S.tour.liveBowlerFigs || "—");
  }
}
function endMatch(match){
  updatePlayerStats(match);
  const awards = computeAwards(match);
  if (awards.motm && awards.motm.team === "You") ensurePlayerStat(awards.motm.n).motm++;
  S.tour.lastAwards = awards;
  S.tour.scorecards.push(match);
  S.tour.live = false;
  S.screen = "scorecard";
  render();
}
function continueAfterScorecard(){
  // Show awards next
  S.screen = "awards";
  save(); render();
}
function continueAfterAwards(){
  const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
  const last = S.tour.scorecards[S.tour.scorecards.length-1];
  if (!last.won){
    S.careerLog.unshift({ t:t.name, won:false, lines: S.tour.scorecards.map((m,i)=>`${t.rounds[i]} v ${m.opp}: L`) });
    S.lives--;
    S.tour = null;
    if (S.lives <= 0){ S.screen = "gameover"; save(); render(); return; }
    S.screen = "hub"; save(); render(); return;
  }
  S.tour.roundIdx++;
  if (S.tour.roundIdx >= t.rounds.length){
    S.trophies[t.id] = true;
    S.careerLog.unshift({ t:t.name, won:true, lines: S.tour.scorecards.map((m,i)=>`${t.rounds[i]} v ${m.opp}: W`) });
    S.tour = null;
    if (S.trophies.wtc && S.trophies.odi && S.trophies.t20) S.screen = "win";
    else S.screen = "hub";
    save(); render(); return;
  }
  S.screen = "order";
  save(); render();
}

function el(h){ const d=document.createElement("div"); d.innerHTML=h.trim(); return d.firstElementChild; }
function render(){
  if (animTimer && S.screen !== "live") { clearTimeout(animTimer); animTimer = null; }
  const root = document.getElementById("app");
  root.innerHTML = "";
  if (S.screen === "setup") { root.append(renderSetup()); return; }
  // Hamburger (mobile only via CSS)
  const ham = el(`<button class="hamburger" title="Menu">☰</button>`);
  ham.onclick = toggleDrawer;
  root.append(ham);
  // Scrim when drawer open on mobile
  if (S.drawerOpen){
    const sc = el(`<div class="scrim"></div>`);
    sc.onclick = toggleDrawer;
    root.append(sc);
  }
  root.append(renderSidebar());
  const main = document.createElement("div"); main.className="main";
  if (S.screen === "draft") main.append(renderDraft());
  else if (S.screen === "hub") main.append(renderHub());
  else if (S.screen === "order") main.append(renderOrder());
  else if (S.screen === "watch-choice") main.append(renderWatchChoice());
  else if (S.screen === "live") main.append(renderLive());
  else if (S.screen === "scorecard") main.append(renderScorecard());
  else if (S.screen === "awards") main.append(renderAwards());
  else if (S.screen === "win") main.append(renderWin());
  else if (S.screen === "gameover") main.append(renderGameOver());
  root.append(main);
}

    </div>`);
    if (wkOnly){
      list.append(el(`<p style="font-size:12px;color:var(--gold);margin-bottom:10px">Last pick must be a wicket-keeper. ${ts.squad.some(p=>p.roles.includes("WK"))?'':'(none in this squad — reroll if you can)'}</p>`));
    }
    const sorted = ts.squad.slice().sort((a,b)=>ratingOf(b)-ratingOf(a));
    sorted.forEach(p => {
      const r = ratingOf(p);
      const taken = alreadyPicked(p.n);
      const wkBlock = wkOnly && !p.roles.includes("WK");
      const disabled = taken || wkBlock;
      const reason = taken ? "Already in squad" : (wkBlock ? "Last pick must be a WK" : "");
      const wkNeeded = wkOnly && p.roles.includes("WK");
      const row = el(`<div class="player ${disabled?'disabled':''} ${wkNeeded?'wk-needed':''}" title="${reason}">
        <div class="r ${S.setup.showRatings?ratingClass(r):'r-hide'}">${S.setup.showRatings?r:'?'}</div>
        <div class="nm"><b>${p.n}</b><small>${ts.team} ${ts.year}</small></div>
        <div class="tags">${p.roles.map(rl=>`<span class="tag t-${rl}">${rl}</span>`).join('')}</div>
      </div>`);
      if (!disabled) row.onclick = () => choosePlayer(p.n);
      list.append(row);
    });
    wrap.append(list);
  }
  return wrap;
}

function renderLive(){
  const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
  const opp = S.tour.opps[S.tour.roundIdx];
  const m = S.tour.currentMatch;
  const innIdx = S.tour.currentInn || 0;
  const inn = m.innings[innIdx];
  const battingIsYou = inn.batTeam === "You";
  const wrap = el(`<div></div>`);
  wrap.append(el(`<h1>${t.icon} ${t.rounds[S.tour.roundIdx]} <span class="muted" style="font-weight:400">vs</span> ${opp.n}</h1>`));
  const totalInn = m.innings.length;
  const showTarget = m.target && innIdx === totalInn - 1;
  let status = "";
  if (m.format === "wtc" && innIdx >= 1){
    const teamA = m.firstBatTeam;
    const teamB = teamA === "You" ? opp.n : "You";
    const a1 = m.innings[0], b1 = m.innings[1];
    const a2 = innIdx >= 2 ? m.innings[2] : null;
    if (innIdx === 1) status = `${teamA} ${a1.runs}/${a1.wickets} (${a1.overs})`;
    else if (innIdx === 2) status = `${teamA} ${a1.runs} · ${teamB} ${b1.runs}/${b1.wickets} (${b1.overs})`;
    else if (innIdx === 3) status = `${teamA} ${a1.runs} & ${a2.runs}/${a2.wickets} · ${teamB} ${b1.runs}`;
  }
  wrap.append(el(`<p class="muted">${m.toss.winner} won the toss and chose to ${m.toss.decision}. Innings ${innIdx+1}/${totalInn}${showTarget?` · target ${m.target}`:''}</p>`));
  if (status) wrap.append(el(`<p class="muted" style="font-size:13px;color:var(--gold)">📋 ${status}</p>`));
  const sb = el(`<div class="scoreboard"></div>`);
  const teams = el(`<div class="sb-teams"></div>`);
  teams.append(el(`<div class="sb-team batting"><div class="nm">${inn.batTeam} ${battingIsYou?'(you)':''} — batting</div><div class="sc">${S.tour.liveRuns||0}/${S.tour.liveWkts||0}</div><div class="ov">${S.tour.liveOver||'0.0'} overs</div></div>`));
  teams.append(el(`<div class="sb-vs">VS</div>`));
  const other = innIdx===0 ? null : m.innings[0];
  teams.append(el(`<div class="sb-team"><div class="nm">${inn.bowlTeam} ${inn.bowlTeam==="You"?'(you)':''} — ${other?'batted':'bowling'}</div><div class="sc">${other?other.runs+'/'+other.wickets:'—'}</div><div class="ov">${other?other.overs+' overs':'yet to bat'}</div></div>`));
  sb.append(teams);
  sb.append(el(`<div class="sb-bar"><i style="width:0%"></i></div>`));
  wrap.append(sb);

  // Current batters + bowler info
  const li = el(`<div class="live-info">
    <div class="live-box">
      <div class="h">At the crease</div>
      <div class="p on"><b id="liveStriker">—</b><span class="fig" id="liveStrikerFig">0(0)</span></div>
      <div class="p"><b id="liveNonStriker">—</b><span class="fig" id="liveNSFig">0(0)</span></div>
    </div>
    <div class="live-box">
      <div class="h">Bowling</div>
      <div class="p"><b id="liveBowler">—</b><span class="fig" id="liveBowlerFig">—</span></div>
    </div>
  </div>`);
  wrap.append(li);

  wrap.append(el(`<h2>Live commentary</h2>`));
  wrap.append(el(`<div id="commentary" class="commentary"></div>`));
  const row = el(`<div class="row" style="justify-content:space-between;margin-top:12px"></div>`);
  const speed = el(`<div class="row"><span class="muted" style="font-size:12px">Speed:</span></div>`);
  [1,2,4,10].forEach(s=>{
    const b = el(`<button class="${S.tour.speed===s?'gold':'ghost'}" style="padding:6px 12px;font-size:12px">${s}×</button>`);
    b.onclick = () => { S.tour.speed=s; render(); };
    speed.append(b);
  });
  const skip = el(`<button class="ghost">Skip to result →</button>`);
  skip.onclick = () => {
    if (animTimer) { clearTimeout(animTimer); animTimer = null; }
    // Fast-forward through all remaining innings
    let i = S.tour.currentInn || 0;
    while (i < m.innings.length){
      const inn = m.innings[i];
      const startEvt = (i === (S.tour.currentInn||0)) ? S.tour.evtIdx : 0;
      for (let j = startEvt; j < inn.events.length; j++){
        appendCommentary(inn.events[j]);
      }
      i++;
    }
    endMatch(m);
  };
  row.append(speed, skip);
  wrap.append(row);
  return wrap;
}

function renderScorecard(){
  const m = S.tour.scorecards[S.tour.scorecards.length-1];
  const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
  const opp = S.tour.opps[S.tour.roundIdx];
  const wrap = el(`<div></div>`);
  const winner = m.won ? "You" : opp.n;
  const margin = computeMargin(m);
  wrap.append(el(`<h1>${m.won?'🏆 WIN':'😞 LOSS'} <span class="muted" style="font-weight:400;font-size:18px">· ${winner} won by ${margin}</span></h1>`));
  wrap.append(el(`<p class="muted">${t.rounds[S.tour.roundIdx]} · ${t.name.replace('ICC ','')} · vs ${opp.n}</p>`));
  m.innings.forEach((inn,i)=>{
    wrap.append(el(`<h2 style="margin-top:20px">${inn.batTeam} — ${inn.runs}/${inn.wickets} (${inn.overs} ov)</h2>`));
    const bt = el(`<table class="card-table"></table>`);
    bt.innerHTML = `<thead><tr><th>Batter</th><th>Dismissal</th><th class="r">R</th><th class="r">B</th><th class="r">4s</th><th class="r">6s</th><th class="r">SR</th></tr></thead><tbody>${
      inn.batCard.filter(b=>b.balls>0||b.out).map(b=>`<tr><td><b>${b.n}</b></td><td class="out">${b.out?b.dismissal:'not out'}</td><td class="r">${b.runs}</td><td class="r">${b.balls}</td><td class="r">${b.fours}</td><td class="r">${b.sixes}</td><td class="r">${b.balls?((b.runs/b.balls)*100).toFixed(1):'—'}</td></tr>`).join("")
    }</tbody>`;
    wrap.append(bt);
    wrap.append(el(`<h3 style="margin-top:14px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${inn.bowlTeam} bowling</h3>`));
    const bw = el(`<table class="card-table"></table>`);
    bw.innerHTML = `<thead><tr><th>Bowler</th><th class="r">O</th><th class="r">R</th><th class="r">W</th><th class="r">M</th><th class="r">Econ</th></tr></thead><tbody>${
      inn.bowlCard.filter(b=>b.balls>0).map(b=>{
        const ov = Math.floor(b.balls/6)+'.'+(b.balls%6);
        const econ = (b.balls?b.runs/(b.balls/6):0).toFixed(2);
        return `<tr><td><b>${b.n}</b></td><td class="r">${ov}</td><td class="r">${b.runs}</td><td class="r">${b.wickets}</td><td class="r">${b.maidens}</td><td class="r">${econ}</td></tr>`;
      }).join("")
    }</tbody>`;
    wrap.append(bw);
  });
  const row = el(`<div class="row" style="justify-content:space-between;margin-top:24px"></div>`);
  const back = el(`<button class="ghost">← Abandon tournament</button>`);
  back.onclick = () => {
    if (!m.won) S.lives--;
    S.tour=null;
    if (S.lives <= 0) S.screen = "gameover"; else S.screen = "hub";
    save(); render();
  };
  const cont = el(`<button class="primary">View awards →</button>`);
  cont.onclick = continueAfterScorecard;
  row.append(back, cont);
  wrap.append(row);
  return wrap;
}

function computeMargin(m){
  if (m.format === "wtc"){
    const lastChase = m.innings[3];
    if (lastChase.runs >= m.target) return `${10 - lastChase.wickets} wickets`;
    return `${m.target - lastChase.runs - 1} runs`;
  }
  const i0=m.innings[0], i1=m.innings[1];
  if (i1.runs >= (i0.runs+1)) return `${10 - i1.wickets} wickets`;
  return `${i0.runs - i1.runs} runs`;
}

  setTimeout(()=>{
    const c = document.createElement("div"); c.className = "confetti";
    const colors = ['#f5c451','#3ddc97','#5aa9ff','#ff5d73','#a578f0'];
    for (let i=0;i<80;i++){
      const p = document.createElement("i");
      p.style.left = Math.random()*100+'%';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration = (2+Math.random()*3)+'s';
      p.style.animationDelay = (Math.random()*1.5)+'s';
      c.appendChild(p);
    }
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 6000);
  },50);
  const wrap = el(`<div></div>`);
  wrap.append(el(`<div class="hero" style="background:radial-gradient(ellipse at center,#3a2a08 0%,transparent 60%)">
    <h1 style="font-size:72px;letter-spacing:4px">🏆🏆🏆</h1>
    <h1 style="font-size:48px;background:linear-gradient(180deg,#f5c451,#d4a435);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">TRIPLE CROWN</h1>
    <p>You won the WTC, ODI World Cup and T20 World Cup. Legendary career.</p>
  </div>`));
  const row = el(`<div class="row" style="justify-content:center;margin-top:20px"></div>`);
  const a = el(`<button class="primary" style="padding:14px 28px;font-size:15px">Start a new career</button>`);
  a.onclick = () => reset();
  row.append(a);
  wrap.append(row);
  return wrap;
}

if (S.tour && !S.tour.speed) S.tour.speed = 2;
render();
</script>
</body>
</html>
