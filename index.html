function simulateMatch(t, myPlayers, opp){
  const my = myPlayers.slice();
  const myBat = my.slice(); // user-defined batting order
  // A bowling attack must be able to cover the innings within the per-bowler
  // over cap: ceil(overs / cap) bowlers (5 for a 20-over T20 at 4 each). Pad
  // thin attacks with the lowest-rated remaining players so nobody is ever
  // forced to bowl over quota.
  const maxPerBowler = t.fmt==="t20" ? 4 : t.fmt==="odi" ? 10 : 30;
  const minBowlers = Math.ceil(t.overs / maxPerBowler);
  const padAttack = (attack, squad) => {
    if (attack.length >= minBowlers) return attack;
    const fillers = squad.filter(p=>!attack.includes(p)).sort((a,b)=>ratingOf(a)-ratingOf(b)).slice(0, minBowlers-attack.length);
    return attack.concat(fillers);
  };
  const myBowl = padAttack(my.filter(isBowler).sort((a,b)=>bowlSkill(b)-bowlSkill(a)).slice(0,6), my);
  const oppPlayers = buildOppXI(opp);
  const oppBat = orderForBatting(oppPlayers);
  const oppBowl = padAttack(oppPlayers.filter(p => p.roles.includes("PAC")||p.roles.includes("SPN")||p.roles.includes("AR")).slice(0,6), oppPlayers);

  const tossWin = Math.random() < 0.5 ? "me" : "opp";
  const tossDecision = (Math.random()<0.5?"bat":"bowl");
  let firstBatTeam = (tossWin === "me" ? (tossDecision === "bat" ? "me":"opp") : (tossDecision === "bat" ? "opp":"me"));
  const meBatFirst = firstBatTeam === "me";

  // Role-aware ratings for the user's XI: batting vs bowling are now distinct,
  // so a side with no real attack defends with a weak (~40) bowling rating.
  const myS = strengthsFor(my);
  const myBatR = myS.batting, myBowlR = myS.bowling, myR = myS.overall;
  const oppR = opp.r;   // opponents are balanced real squads (and carry the difficulty offset)

  // Helper to build innings config for a given side
  const cfgFirst = () => ({
    fmt:t.fmt, overs:t.overs, base:t.base,
    bat: meBatFirst?myBat:oppBat, bowl: meBatFirst?oppBowl:myBowl,
    batTeam: meBatFirst?"You":opp.n, bowlTeam: meBatFirst?opp.n:"You",
    batRating: meBatFirst?myBatR:oppR, bowlRating: meBatFirst?oppR:myBowlR
  });
  const cfgSecond = (chasing) => ({
    fmt:t.fmt, overs:t.overs, base:t.base, chasing,
    bat: meBatFirst?oppBat:myBat, bowl: meBatFirst?myBowl:oppBowl,
    batTeam: meBatFirst?opp.n:"You", bowlTeam: meBatFirst?"You":opp.n,
    batRating: meBatFirst?oppR:myBatR, bowlRating: meBatFirst?myBowlR:oppR
  });

  if (t.fmt === "wtc"){
    // 4-innings Test match
    const innA1 = simInnings(cfgFirst());
    const innB1 = simInnings(cfgSecond());            // no chase in 1st innings of B
    // Reset chasing for innB1 — pass cfgSecond without chasing
    // Actually we passed undefined-> ok
    // 2nd innings of A (no chase)
    const innA2 = simInnings(cfgFirst());
    const target = innA1.runs + innA2.runs - innB1.runs + 1;
    const innB2 = simInnings(cfgSecond(target));
    let won;
    if (target <= 0) {
      // A leads by negative => B already won by innings, but we still play out
      won = !meBatFirst;
    } else if (innB2.runs >= target) {
      won = !meBatFirst; // chaser won
    } else {
      won = meBatFirst; // first-bat team won
    }
    return { opp:opp.n, format:t.fmt, overs:t.overs,
      toss:{ winner: tossWin==="me"?"You":opp.n, decision: tossDecision },
      firstBatTeam:meBatFirst?"You":opp.n, target,
      innings:[innA1, innB1, innA2, innB2], won };
  }

  // Limited-overs: 2 innings
  const inn1 = simInnings(cfgFirst());
  const target = inn1.runs + 1;
  const inn2 = simInnings(cfgSecond(target));
  let won, tie = false;
  if (inn2.runs >= target) won = !meBatFirst;            // chase completed
  else if (inn2.runs === inn1.runs){                     // scores level — Super Over
    tie = true;
    won = (myR + (Math.random()-0.5)*10) >= (oppR + (Math.random()-0.5)*10);
  } else won = meBatFirst;                               // total defended
  return { opp:opp.n, format:t.fmt, overs:t.overs, tie,
    toss:{ winner: tossWin==="me"?"You":opp.n, decision: tossDecision },
    firstBatTeam:meBatFirst?"You":opp.n, target,
    innings:[inn1, inn2], won };
}

function orderForBatting(players){
  const openers = players.filter(p=>p.roles.includes("OPN")).sort((a,b)=>ratingOf(b)-ratingOf(a)).slice(0,2);
  let rest = players.filter(p=>!openers.includes(p));
  const mids = rest.filter(p=>p.roles.includes("BAT")&&!p.roles.includes("AR")).sort((a,b)=>ratingOf(b)-ratingOf(a));
  rest = rest.filter(p=>!mids.includes(p));
  const keepers = rest.filter(isKeeper);
  rest = rest.filter(p=>!keepers.includes(p));
  const fin = rest.filter(p=>p.roles.includes("FIN"));
  rest = rest.filter(p=>!fin.includes(p));
  const ars = rest.filter(p=>p.roles.includes("AR"));
  rest = rest.filter(p=>!ars.includes(p));
  return [...openers, ...mids, ...keepers, ...fin, ...ars, ...rest];
}

function buildOppXI(opp){ return (OPP_XI[opp.n] || []).slice(); }
function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length; }

function simInnings({fmt, overs, base, bat, bowl, batTeam, bowlTeam, batRating, bowlRating, chasing}){
  // Per-ball skill is role-aware: a batsman forced to bowl (or a bowler batting)
  // uses their reduced batSkill/bowlSkill, floored so they're weak — not absurd.
  const batCard = bat.map(p=>({ n:p.n, roles:p.roles, r:Math.max(50, batSkill(p)), runs:0, balls:0, fours:0, sixes:0, out:false, dismissal:null }));
  const bowlCard = bowl.map(p=>({ n:p.n, roles:p.roles, r:Math.max(50, bowlSkill(p)), overs:0, balls:0, runs:0, wickets:0, maidens:0 }));
  let runs=0, wickets=0, ballNo=0;
  let strikerIdx=0, nonStrikerIdx=1, nextBat=2;
  const events = [];

  const isTest = fmt === "wtc";
  const maxScore = fmt==="t20" ? 300 : fmt==="odi" ? 350 : 520;
  const expectedTotal = Math.min(maxScore, base * Math.pow(batRating/85, 1.0) * Math.pow(85/bowlRating, 0.6));
  const runRate = expectedTotal / overs;
  const maxOversPerBowler = fmt==="t20" ? 4 : fmt==="odi" ? 10 : 30;
  function nextBowler(prev){
    // Pick the under-quota bowler with the fewest overs so far, never repeating
    // the previous over's bowler. Spreads overs evenly and never exceeds the cap
    // while any legal bowler remains.
    let best = -1;
    for (let i=0;i<bowlCard.length;i++){
      if (i === prev || bowlCard[i].overs >= maxOversPerBowler) continue;
      if (best === -1 || bowlCard[i].overs < bowlCard[best].overs) best = i;
    }
    if (best === -1){ // last resort: everyone else is at quota
      for (let i=0;i<bowlCard.length;i++){ if (i !== prev){ best = i; break; } }
      if (best === -1) best = prev;
    }
    return best;
  }
  let lastBowler = -1;

  function bowlerFigsStr(bw){
    const ov = Math.floor(bw.balls/6)+'.'+(bw.balls%6);
    return `${bw.wickets}/${bw.runs} (${ov})`;
  }

  outer:
  for (let ov=0; ov<overs; ov++){
    const curBowler = nextBowler(lastBowler);
    lastBowler = curBowler;
    const bw = bowlCard[curBowler];
    let overRuns = 0;
    for (let b=0; b<6; b++){
      ballNo++;
      const striker = batCard[strikerIdx];
      const nonStriker = batCard[nonStrikerIdx];
      striker.balls++; bw.balls++;
      const batSkillVal = striker.r * (striker.roles.includes("FIN") && fmt==="t20" ? 1.08 : 1);
      const bowlSkillVal = bw.r;
      const diff = batSkillVal - bowlSkillVal;
      // Format-specific probabilities — Test = much higher dot rate, lower boundaries
      const wktBase = isTest ? 0.022 : fmt==="t20" ? 0.045 : 0.04;
      const wktProb = Math.max(0.005, Math.min(0.18, wktBase - diff*0.0015 + (wickets>=7?0.03:0)));
      const sixP  = isTest ? Math.max(0.003, 0.005+diff*0.0008)
                   : Math.max(0.02, Math.min(0.20, 0.05 + diff*0.003 + (fmt==="t20"?0.06:0.02)));
      const fourP = isTest ? Math.max(0.04, 0.07+diff*0.002)
                   : Math.max(0.05, Math.min(0.28, 0.10 + diff*0.0025 + (fmt==="t20"?0.05:0.02)));
      const twoP  = isTest ? 0.05 : 0.10;
      const oneP  = isTest ? 0.22 : fmt==="t20" ? 0.30 : 0.36;
      const roll = Math.random();
      let evt;
      if (roll < wktProb) evt = "W";
      else {
        const r2 = Math.random();
        let cum = sixP;
        if (r2 < cum) evt = "6";
        else if (r2 < (cum+=fourP)) evt = "4";
        else if (r2 < (cum+=twoP)) evt = "2";
        else if (r2 < (cum+=oneP)) evt = "1";
        else evt = "0";
      }
      // Cap: as score approaches maxScore, stop boundaries
      if (evt !== "W" && runs >= maxScore - 4){
        if (evt === "6" || evt === "4") evt = Math.random()<0.5 ? "1" : "0";
      }
      if (chasing){
        const need = chasing - runs;
        const ballsLeft = (overs*6) - ballNo;
        const rrr = need / (ballsLeft/6);
        if (rrr > runRate * 1.4) {
          if (evt === "0" && Math.random() < 0.35) evt = (Math.random()<0.4?"4":"1");
          if (Math.random() < 0.04) evt = "W";
        }
      }
      // Build event with full context
      const ctxBase = { striker: striker.n, nonStriker: nonStriker?nonStriker.n:null,
                        bowler: bw.n,
                        strikerR: striker.runs, strikerB: striker.balls,
                        nsR: nonStriker?nonStriker.runs:0, nsB: nonStriker?nonStriker.balls:0,
                        bowlerFigs: bowlerFigsStr(bw) };
      if (evt === "W"){
        wickets++;
        striker.out = true; striker.dismissal = `b ${lastName(bw.n)}`;
        bw.wickets++;
        const txt = fmtCommentary(ov, b+1, "wicket", { striker:striker.n, bowler:bw.n, dismissal:striker.dismissal, strikerRuns:striker.runs });
        events.push({ ov, b:b+1, txt, k:"W", runs, wkts:wickets, ...ctxBase, bowlerFigs: bowlerFigsStr(bw) });
        if (nextBat < batCard.length){ strikerIdx = nextBat; nextBat++; }
        else { events.push({ ov, b:b+1, txt:`All out · ${runs}/${wickets}`, k:"end" }); break outer; }
      } else {
        const r = parseInt(evt,10);
        striker.runs += r; runs += r; bw.runs += r; overRuns += r;
        if (r===4) striker.fours++;
        if (r===6) striker.sixes++;
        const ctx = { striker:striker.n, bowler:bw.n, strikerRuns:striker.runs };
        let kind = "dot"; if (r===6) kind="six"; else if (r===4) kind="four"; else if (r===3) kind="three"; else if (r===2) kind="two"; else if (r===1) kind="one";
        const txt = fmtCommentary(ov, b+1, kind, ctx);
        events.push({ ov, b:b+1, txt, k:evt, runs, wkts:wickets, ...ctxBase,
                      strikerR: striker.runs, strikerB: striker.balls,
                      bowlerFigs: bowlerFigsStr(bw) });
        if (r % 2 === 1) [strikerIdx, nonStrikerIdx] = [nonStrikerIdx, strikerIdx];
      }
      if (chasing && runs >= chasing) {
        events.push({ ov, b:b+1, txt:`Target reached! ${runs}/${wickets} in ${ov}.${b+1}`, k:"end", runs, wkts:wickets });
        bw.overs += (b+1)/6;
        return { runs, wickets, overs:`${ov}.${b+1}`, batCard, bowlCard, events, batTeam, bowlTeam };
      }
    }
    bw.overs += 1;
    if (overRuns === 0) bw.maidens++;
    [strikerIdx, nonStrikerIdx] = [nonStrikerIdx, strikerIdx];
    events.push({ ov:ov+1, b:0, k:"ov", txt:`End over ${ov+1}: ${runs}/${wickets} · ${(runs/(ov+1)).toFixed(2)} RR`, runs, wkts:wickets });
  }
  return { runs, wickets, overs:`${overs}.0`, batCard, bowlCard, events, batTeam, bowlTeam };
}

/* =========== ANIM =========== */
function animateInnings(match, innIdx){
  S.tour.currentInn = innIdx;
  S.tour.evtIdx = 0;
  S.tour.liveRuns = 0; S.tour.liveWkts = 0; S.tour.liveOver = "0.0";
  S.tour.liveStriker = null; S.tour.liveBowler = null;
  render();
  step();
  function step(){
    if (!S.tour || S.screen !== "live") return;
    const inn = match.innings[innIdx];
    const ev = inn.events[S.tour.evtIdx];
    if (!ev){
      if (innIdx < match.innings.length - 1)
        animTimer = setTimeout(()=>animateInnings(match, innIdx+1), 1100);
      else endMatch(match);
      return;
    }
    if (ev.runs !== undefined){ S.tour.liveRuns = ev.runs; S.tour.liveWkts = ev.wkts; }
    if (ev.k === "ov" || ev.k === "end") S.tour.liveOver = `${ev.ov}.0`;
    else S.tour.liveOver = `${ev.ov}.${ev.b}`;
    if (ev.striker){
      S.tour.liveStriker = ev.striker;
      S.tour.liveNonStriker = ev.nonStriker;
      S.tour.liveBowler = ev.bowler;
      S.tour.liveStrikerR = ev.strikerR; S.tour.liveStrikerB = ev.strikerB;
      S.tour.liveNSR = ev.nsR; S.tour.liveNSB = ev.nsB;
      S.tour.liveBowlerFigs = ev.bowlerFigs;
    }
    appendCommentary(ev);
    flashScore();
    S.tour.evtIdx++;
    const delay = ev.k==="W"?420 : (ev.k==="6"||ev.k==="4"?280 : ev.k==="ov"?180 : 95);
    animTimer = setTimeout(step, delay/(S.tour.speed||2));
  }
}
function appendCommentary(ev){
  const box = document.getElementById("commentary");
  if (!box) return;
  const d = document.createElement("div");
  d.className = ev.k==="ov" ? "c-ov" : (ev.k==="W" ? "c-W" : (ev.k==="6"?"c-6":(ev.k==="4"?"c-4":"")));
  d.textContent = ev.txt;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  // Sound effects on commentary events
  if (ev.k === "W") sfx("wicket");
  else if (ev.k === "6") sfx("six");
  else if (ev.k === "4") sfx("four");
}
function flashScore(){
  const sc = document.querySelector(".sb-team.batting .sc");
  if (sc){ sc.classList.add("flash"); setTimeout(()=>sc.classList.remove("flash"),400); }
  const bar = document.querySelector(".sb-bar > i");
  if (bar && S.tour.currentMatch){
    const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
    const totalBalls = t.overs*6;
    const [ovs,bs] = S.tour.liveOver.split(".").map(Number);
    bar.style.width = `${Math.min(100,(ovs*6+bs)/totalBalls*100)}%`;
  }
  const sbTeam = document.querySelector(".sb-team.batting");
  if (sbTeam){
    sbTeam.querySelector(".sc").textContent = `${S.tour.liveRuns}/${S.tour.liveWkts}`;
    sbTeam.querySelector(".ov").textContent = `${S.tour.liveOver} overs`;
  }
  // Update live batters/bowler panel
  if (S.tour.liveStriker){
    const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    setT("liveStriker", S.tour.liveStriker + "*");
    setT("liveStrikerFig", `${S.tour.liveStrikerR||0}(${S.tour.liveStrikerB||0})`);
    setT("liveNonStriker", S.tour.liveNonStriker || "—");
    setT("liveNSFig", `${S.tour.liveNSR||0}(${S.tour.liveNSB||0})`);
    setT("liveBowler", S.tour.liveBowler || "—");
    setT("liveBowlerFig", S.tour.liveBowlerFigs || "—");
  }
  // Update chase tracker
  const m = S.tour.currentMatch;
  if (m && m.target){
    const totalInn = m.innings.length;
    if (S.tour.currentInn === totalInn - 1){
      const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
      const [ovs, bs] = S.tour.liveOver.split(".").map(Number);
      const ballsBowled = ovs*6 + bs;
      const ballsLeft = Math.max(0, t.overs*6 - ballsBowled);
      const need = Math.max(0, m.target - (S.tour.liveRuns||0));
      const rrr = ballsLeft > 0 ? (need/(ballsLeft/6)) : 0;
      const set = (id,v,cls)=>{ const e=document.getElementById(id); if (e){ e.textContent=v; if (cls){ e.className=cls; } } };
      set("chaseNeed", need, need===0?"green":"red");
      set("chaseBalls", ballsLeft);
      set("chaseRRR", rrr.toFixed(2), rrr>10?"red":rrr>7?"gold":"green");
    }
  }
}
function endMatch(match){
  updatePlayerStats(match);
  const awards = computeAwards(match);
  if (awards.motm && awards.motm.team === "You") ensurePlayerStat(awards.motm.n).motm++;
  S.tour.lastAwards = awards;
  S.tour.scorecards.push(match);
  S.tour.live = false;
  S.screen = "scorecard";
  render();
}
function continueAfterScorecard(){
  // Show awards next
  S.screen = "awards";
  save(); render();
}
function continueAfterAwards(){
  const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
  const last = S.tour.scorecards[S.tour.scorecards.length-1];
  recordMatchResult(!!last.won);   // per-run loss/streak tracking (knockout match)
  if (!last.won){
    S.careerLog.unshift({ t:t.name, won:false, lines: S.tour.scorecards.map((m,i)=>`${t.rounds[i]} v ${m.opp}: L`) });
    S.tour.summary = buildTournamentSummary(false);
    commitRunProgress();
    S.screen = "summary"; save(); render(); return;
  }
  S.tour.roundIdx++;
  if (S.tour.roundIdx >= t.rounds.length){
    S.trophies[t.id] = true;
    S.careerLog.unshift({ t:t.name, won:true, lines: S.tour.scorecards.map((m,i)=>`${t.rounds[i]} v ${m.opp}: W`) });
    S.tour.summary = buildTournamentSummary(true);
    commitRunProgress();
    if (S.trophies.ipl && S.trophies.psl && S.trophies.bbl && S.trophies.cl) {
      commitGrandSlam();   // record the slam (+ Invincible if zero losses this run)
      // Set summary screen first, then user can navigate to win
      S.screen = "summary"; save(); render(); return;
    }
    S.screen = "summary";
    save(); render(); return;
  }
  S.screen = "order";
  save(); render();
}

/* =========== RENDER =========== */
function el(h){ const d=document.createElement("div"); d.innerHTML=h.trim(); return d.firstElementChild; }
let _sideSig = null;
let _prevScreen = null;
function ensureFab(){
  // Floating feedback button lives on <body>, persists across renders.
  if (!document.getElementById("fab-feedback")){
    const fab = el(`<button id="fab-feedback" class="fab-feedback" title="Send feedback">💬</button>`);
    fab.onclick = openFeedbackModal;
    document.body.appendChild(fab);
  }
}
function sidebarSignature(){
  // Everything renderSidebar() visibly depends on. While this is unchanged we
  // leave the existing sidebar DOM in place, so the "YOUR XI" name list doesn't
  // flicker or scroll-reset on every button press.
  return [S.screen, S.setup.showRatings, S.rerollsLeft, S.rerollsTotal,
    S.squad.map(s=>s.player?s.player.n:'-').join('|')].join('::');
}
function buildScreen(){
  if (S.screen === "draft") return renderDraft();
  if (S.screen === "auction") return renderAuction();
  if (S.screen === "hub") return renderHub();
  if (S.screen === "odds") return renderOdds();
  if (S.screen === "summary") return renderSummary();
  if (S.screen === "leaguesim") return renderLeagueSim();
  if (S.screen === "order") return renderOrder();
  if (S.screen === "watch-choice") return renderWatchChoice();
  if (S.screen === "live") return renderLive();
  if (S.screen === "scorecard") return renderScorecard();
  if (S.screen === "awards") return renderAwards();
  if (S.screen === "win") return renderWin();
  return el(`<div></div>`);
}
function render(){
  if (animTimer && S.screen !== "live") { clearTimeout(animTimer); animTimer = null; }
  const root = document.getElementById("app");

  // Setup is a standalone full-screen view with no app shell.
  if (S.screen === "setup") {
    root.innerHTML = ""; root.className = "app no-sidebar"; _sideSig = null;
    const sc = renderSetup();
    if (S.screen !== _prevScreen){ window.scrollTo(0,0); sc.classList.add("screen-enter"); _prevScreen = S.screen; }
    root.append(sc); ensureFab(); return;
  }
  root.className = "app";
  if (S.screen === "win") root.className = "app no-sidebar";

  // Build the persistent shell (hamburger + sidebar + main container) once, then
  // reuse it. Only the main panel is swapped on every render; the sidebar is
  // rebuilt only when sidebarSignature() changes. This stops the name list from
  // refreshing each time a button is pressed.
  let main = root.querySelector(":scope > .main");
  if (!main || !root.querySelector(":scope > .hamburger")){
    root.innerHTML = ""; _sideSig = null;
    const ham = el(`<button class="hamburger" title="Menu">☰</button>`);
    ham.onclick = toggleDrawer;
    root.append(ham, renderSidebar());
    _sideSig = sidebarSignature();
    main = document.createElement("div"); main.className = "main";
    root.append(main);
  }

  // Drawer scrim (mobile): add/remove in place without disturbing siblings.
  let scrim = root.querySelector(":scope > .scrim");
  if (S.drawerOpen && !scrim){ scrim = el(`<div class="scrim"></div>`); scrim.onclick = toggleDrawer; root.querySelector(":scope > .hamburger").after(scrim); }
  else if (!S.drawerOpen && scrim){ scrim.remove(); }

  // Sidebar: rebuild only when its inputs actually changed.
  const sig = sidebarSignature();
  const sb = root.querySelector(":scope > .sidebar");
  if (!sb || sig !== _sideSig){
    const fresh = renderSidebar();
    if (sb) sb.replaceWith(fresh); else root.querySelector(":scope > .hamburger").after(fresh);
    _sideSig = sig;
  } else {
    sb.classList.toggle("open", !!S.drawerOpen); // keep drawer state in sync
  }

  // Main panel: always refreshed (this is the part that changes per interaction).
  main.innerHTML = "";
  main.append(buildScreen());
  // On a screen CHANGE (navigation): scroll to top + play the enter transition.
  // Same-screen re-renders (picking a player, live updates) are left untouched.
  if (S.screen !== _prevScreen){
    window.scrollTo(0, 0);
    main.classList.remove("screen-enter"); void main.offsetWidth; main.classList.add("screen-enter");
    _prevScreen = S.screen;
  }
  ensureFab();
}

  return side;
}

function diffBadge(t){
  const colors = ['', '#3ddc97', '#f5c451', '#f59e3c', '#ff5d73'];

  let dots = '';
  for (let i=1;i<=4;i++) dots += `<span class="dot"${i<=t.diff?` style="background:${col}"`:''}></span>`;
  return `<span class="diff-badge" title="Difficulty: ${t.diffLabel}"><span class="diff-dots">${dots}</span><span class="diff-lbl" style="color:${col}">${t.diffLabel}</span></span>`;
}

let _leagueInt = null;
function startLeagueSim(){
  const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
  let pool = OPPONENTS.filter(o => t.leagues.includes(o.league));
  // Every real franchise in this league participates (one canonical edition each).
  let teams = canonicalLeagueTeams(pool);
  const mod = DIFFICULTY_OFFSET;
  const allTeams = [
    { n:"Your XI", r: (squadStrengths()||{overall:70}).overall, isMe:true },
    ...teams.map(o => ({ n:o.n, r: Math.max(60, Math.min(99, oppRating(o) + mod)), isMe:false }))
  ];
  // Double round-robin using the circle method.
  // Each team plays every other team exactly twice (one home, one away).
  // Fixtures are interleaved by Game Week so AI matches and the user's matches
  // happen in the same round, like a real league season.
  const fixtures = buildDoubleRoundRobin(allTeams);
  const perGw = Math.max(1, Math.floor(allTeams.length / 2));
  const standings = allTeams.map(t => ({ team:t, P:0, W:0, L:0, F:0, A:0, oversFor:0, oversAgainst:0, pts:0, nrr:0 }));
  S.tour.league = { fixtures, standings, fixtureIdx:0, teams: allTeams, perGw, done:false };
  S.screen = "leaguesim";
  save(); render();
  startLeagueAnim();
}
// Circle-method round-robin. Returns one full leg (each pair plays once),
// scheduled across (N-1) game weeks with (N/2) matches per week.
function roundRobinLeg(teams, gwOffset){
  const arr = teams.slice();
  if (arr.length % 2 === 1) arr.push({ n:"__BYE__", isBye:true });
  const n = arr.length;
  const half = n / 2;
  const rounds = n - 1;
  const fixed = arr[0];
  let rota = arr.slice(1);
  const out = [];
  for (let r = 0; r < rounds; r++){
    const gw = gwOffset + r + 1;
    // Pair the fixed team with the LAST in the rota
    const opp = rota[rota.length - 1];
    if (!fixed.isBye && !opp.isBye){
      out.push({ home: fixed, away: opp, result:null, gw });
    }
    // Pair the others by walking inward
    for (let i = 0; i < half - 1; i++){
      const h = rota[i];
      const a = rota[rota.length - 2 - i];
      if (h && a && !h.isBye && !a.isBye){
        out.push({ home: h, away: a, result:null, gw });
      }
    }
    // Rotate: last element moves to the front
    rota = [rota[rota.length - 1], ...rota.slice(0, rota.length - 1)];
  }
  return out;
}
function buildDoubleRoundRobin(teams){
  // First leg as scheduled
  const leg1 = roundRobinLeg(teams, 0);
  // Second leg: same schedule but swap home/away — and continue the gw counter
  const numRounds = teams.length % 2 === 0 ? teams.length - 1 : teams.length;
  const leg2 = roundRobinLeg(teams, numRounds).map(f => ({ home:f.away, away:f.home, result:null, gw:f.gw }));
  return leg1.concat(leg2);
}

const LEAGUE_OVERS = 20;  // T20 league matches; used for Net Run Rate
// Net Run Rate = (runs scored / overs faced) − (runs conceded / overs bowled).
// Realistically lands in roughly ±3; back-compat falls back to overs = 20·P
// for any standings row saved before overs were tracked.
function nrrOf(s){
  const oF = s.oversFor || (s.P * LEAGUE_OVERS);
  const oA = s.oversAgainst || (s.P * LEAGUE_OVERS);
  if (!oF || !oA) return 0;
  return (s.F / oF) - (s.A / oA);
}
function simSingleLeagueMatch(home, away){
  // Two-innings T20 single-match outcome (compressed)
  const base = 170;
  // Wider variance (±35) — underdogs deserve a chance, favourites can flop
  let hScore = base * Math.pow(home.r/85, 1.0) * Math.pow(85/away.r, 0.35) + (Math.random()-0.5)*70;
  let aScore = base * Math.pow(away.r/85, 1.0) * Math.pow(85/home.r, 0.35) + (Math.random()-0.5)*70;
  hScore = Math.min(300, Math.max(60, Math.round(hScore)));
  aScore = Math.min(300, Math.max(60, Math.round(aScore)));
  const winner = hScore >= aScore ? "home" : "away";
  // Overs faced — needed for a realistic Net Run Rate. The side batting first
  // uses the full 20 overs; a successful chase finishes early in proportion to
  // the winning margin (so dominant wins earn a healthier +NRR). Half the time
  // the winner defended a total (batted first), so both sides face the full quota.
  let homeOvers = LEAGUE_OVERS, awayOvers = LEAGUE_OVERS;
  const winnerChased = Math.random() < 0.5;
  if (winnerChased){
    const winScore = winner === "home" ? hScore : aScore;
    const chaseTarget = (winner === "home" ? aScore : hScore) + 1;
    // Reach the target then stop; never quicker than 8 overs, never the full 20.
    const used = Math.min(LEAGUE_OVERS - 0.1, Math.max(8, LEAGUE_OVERS * chaseTarget / Math.max(1, winScore)));
    if (winner === "home") homeOvers = used; else awayOvers = used;
  }
  return { homeScore:hScore, awayScore:aScore, winner, homeOvers, awayOvers };
}
function startLeagueAnim(){
  if (_leagueInt) clearTimeout(_leagueInt);
  scheduleNextLeagueMatch();
}
function scheduleNextLeagueMatch(){
  const lg = S.tour.league;
  if (!lg || S.screen !== "leaguesim"){ if (_leagueInt) clearTimeout(_leagueInt); _leagueInt=null; return; }
  if (lg.fixtureIdx >= lg.fixtures.length){
    if (_leagueInt) clearTimeout(_leagueInt); _leagueInt = null;
    finishLeagueSim();
    return;
  }
  // Look ahead: is the NEXT match involving the user?
  const nextF = lg.fixtures[lg.fixtureIdx];
  const isUserMatch = nextF.home.isMe || nextF.away.isMe;
  // Build suspense — slower delay for the user's own matches; hidden AI-vs-AI
  // matches resolve quickly since nothing is shown for them.
  const delay = isUserMatch ? 1400 : 300;
  _leagueInt = setTimeout(()=>{
    playLeagueMatch();
    scheduleNextLeagueMatch();
  }, delay);
}
function playLeagueMatch(){
  const lg = S.tour.league;
  if (!lg || lg.fixtureIdx >= lg.fixtures.length) return;
  const f = lg.fixtures[lg.fixtureIdx];
  const r = simSingleLeagueMatch(f.home, f.away);
  f.result = r;
  const hs = lg.standings.find(s => s.team.n === f.home.n);
  const as = lg.standings.find(s => s.team.n === f.away.n);
  hs.P++; as.P++;
  hs.F += r.homeScore; hs.A += r.awayScore;
  as.F += r.awayScore; as.A += r.homeScore;
  hs.oversFor += r.homeOvers; hs.oversAgainst += r.awayOvers;
  as.oversFor += r.awayOvers; as.oversAgainst += r.homeOvers;
  if (r.winner === "home"){ hs.W++; hs.pts+=2; as.L++; }
  else { as.W++; as.pts+=2; hs.L++; }
  if (f.home.isMe || f.away.isMe){
    const userWon = (f.home.isMe && r.winner==="home") || (f.away.isMe && r.winner==="away");
    if (userWon) sfx("six"); else sfx("wicket");
    recordMatchResult(userWon);   // per-run loss/streak tracking (Invincible)
    // Distribute league-match stats to your players so summary shows real numbers
    const userRuns = f.home.isMe ? r.homeScore : r.awayScore;
    const oppRuns  = f.home.isMe ? r.awayScore : r.homeScore;
    distributeLeagueMatchStats(userRuns, oppRuns);
  }
  lg.fixtureIdx++;
  lg.standings.sort((a,b)=>{
    if (b.pts !== a.pts) return b.pts - a.pts;
    return nrrOf(b) - nrrOf(a);
  });
  if (f.home.isMe || f.away.isMe) appendLeagueResult(f, r);
  updateStandingsTable();
  updateLeagueProgress();
}
// Approximate per-player contribution from a single user-XI league match.
// (League sim is team-level, so we estimate rather than ball-by-ball.)
function distributeLeagueMatchStats(teamRuns, runsConceded){
  const xi = squadPicks().map(s => s.player);
  if (!xi.length) return;
  // BATTERS — top 6 by rating, skewed to middle order
  const isBat = p => p.roles.includes("OPN")||p.roles.includes("BAT")||p.roles.includes("FIN")||p.roles.includes("WK")||p.roles.includes("AR");
  const batters = xi.filter(isBat).sort((a,b)=>ratingOf(b)-ratingOf(a)).slice(0,6);
  const batDist = [0.22, 0.25, 0.20, 0.15, 0.10, 0.08];
  let runsLeft = teamRuns;
  batters.forEach((p, i) => {
    const st = ensurePlayerStat(p.n);
    const share = Math.max(0, Math.round(teamRuns * batDist[i] * (0.6 + Math.random()*0.8)));
    const playerRuns = Math.min(share, runsLeft);
    runsLeft -= playerRuns;
    const balls = Math.max(playerRuns ? Math.ceil(playerRuns / (1.3 + Math.random()*0.4)) : 0, 0);
    st.runs += playerRuns;
    st.balls += balls;
    if (playerRuns > 20) st.fours += Math.floor(Math.random()*4) + 1;
    if (playerRuns > 35) st.sixes += Math.floor(Math.random()*3) + 1;
  });
  // BOWLERS — top 5 by bowl skill share the wickets (assume ~7 fall on avg)
  const isBowl = p => p.roles.includes("PAC")||p.roles.includes("SPN")||p.roles.includes("AR");
  const bowlers = xi.filter(isBowl).sort((a,b)=>bowlSkill(b)-bowlSkill(a)).slice(0,5);
  if (bowlers.length){
    const totalWkts = Math.min(10, 4 + Math.floor(Math.random()*5));
    let wktsLeft = totalWkts;
    bowlers.forEach((p, i) => {
      const st = ensurePlayerStat(p.n);
      const target = Math.min(wktsLeft, Math.floor((totalWkts / bowlers.length) * (0.5 + Math.random()*1.2)));
      st.wickets += target;
      wktsLeft -= target;
      st.ballsBowled += Math.round(24 * (1 - i*0.12));
      st.runsConceded += Math.round((runsConceded / bowlers.length) * (0.7 + Math.random()*0.6));
    });
  }
  // Match credit for the whole XI
  xi.forEach(p => ensurePlayerStat(p.n).matches++);
}
function finishLeagueSim(){
  const lg = S.tour.league;
  if (!lg) return;
  lg.done = true;
  const myPos = lg.standings.findIndex(s => s.team.isMe) + 1;
  lg.myFinish = myPos;
  S.tour.leagueFinish = myPos;
  // Pause so user sees final table, then enter the playoffs once.
  setTimeout(enterPlayoffs, 2400);
}
// Transition from the finished league table into the playoff bracket. Guarded so
// it can only run once per tournament — both the auto-advance timer and the
// "Continue to playoffs" button funnel through here without double-seeding the
// bracket or replaying a round.
function enterPlayoffs(){
  if (!S.tour || !S.tour.league || S.tour._inPlayoffs) return;
  if (S.screen !== "leaguesim") return;
  S.tour._inPlayoffs = true;
  const lg = S.tour.league;
  const myPos = lg.myFinish;
  if (myPos > 4){
    // Eliminated in league — go straight to summary
    S.tour.summary = buildTournamentSummary(false);
    commitRunProgress();
    S.screen = "summary";
    save(); render(); return;
  }
  // Build playoff opponents = the other top-3 finishers by standings
  const top4 = lg.standings.slice(0,4).filter(s=>!s.team.isMe).map(s=>({ n:s.team.n, r:s.team.r }));
  S.tour.opps = top4;
  S.tour.roundIdx = 0;
  S.screen = "watch-choice";
  save(); render();
}

function appendLeagueResult(f, r){

  if (!feed) return;
  const d = document.createElement("div");
  const meHome = f.home.isMe, meAway = f.away.isMe;
  const homeWon = r.winner === "home";

  const userWon = (meHome && homeWon) || (meAway && !homeWon);
  d.className = "lg-match" + (meInMatch ? (userWon ? " me-win" : " me-loss") : "");
  d.innerHTML = `

}

function buildTournamentSummary(won){
  const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
  const scs = S.tour.scorecards || [];
  // Playoff stats (scorecards from full simulated matches)
  let pWins = scs.filter(m=>m.won).length;
  let pLosses = scs.length - pWins;
  let pRunsFor=0, pRunsAgainst=0;
  scs.forEach(m => m.innings.forEach(inn => {
    if (inn.batTeam === "You") pRunsFor += inn.runs;
    else pRunsAgainst += inn.runs;
  }));
  // League phase stats (from standings if exists)
  let lWins=0, lLosses=0, lRunsFor=0, lRunsAgainst=0;
  let leagueFinish = null;
  if (S.tour.league && S.tour.league.standings){
    const myRow = S.tour.league.standings.find(s => s.team.isMe);
    if (myRow){
      lWins = myRow.W; lLosses = myRow.L;
      lRunsFor = myRow.F; lRunsAgainst = myRow.A;
    }
    leagueFinish = S.tour.leagueFinish || (S.tour.league.standings.findIndex(s=>s.team.isMe)+1);
  }
  const wins = pWins + lWins;
  const losses = pLosses + lLosses;
  const draws = 0;
  const points = wins*2 + draws;
  const finish = won ? 1 : (leagueFinish && leagueFinish > 4 ? leagueFinish : Math.max(2, Math.min(S.tour.opps.length + 1, S.tour.roundIdx + 2)));
  const o = computeOdds() || { projected: 4, expPts: 50 };
  const runsScored = pRunsFor + lRunsFor;
  const runsConceded = pRunsAgainst + lRunsAgainst;
  // Top stats across scorecards
  const playerStats = {};
  scs.forEach(m => m.innings.forEach(inn => {
    if (inn.batTeam === "You") inn.batCard.forEach(b => {
      if (!playerStats[b.n]) playerStats[b.n] = { n:b.n, runs:0, balls:0, fours:0, sixes:0, wickets:0, runsConceded:0, overs:0 };
      const p = playerStats[b.n];
      p.runs += b.runs; p.balls += b.balls; p.fours += b.fours; p.sixes += b.sixes;
    });
    if (inn.bowlTeam === "You") inn.bowlCard.forEach(b => {
      if (!playerStats[b.n]) playerStats[b.n] = { n:b.n, runs:0, balls:0, fours:0, sixes:0, wickets:0, runsConceded:0, overs:0 };
      const p = playerStats[b.n];
      p.wickets += b.wickets; p.runsConceded += b.runs; p.overs += b.balls/6;
    });
  }));
  const all = Object.values(playerStats);
  const topRun = all.slice().sort((a,b)=>b.runs-a.runs)[0];
  if (topRun) topRun.sr = topRun.balls ? (topRun.runs/topRun.balls)*100 : 0;
  const topWkt = all.filter(p=>p.wickets>0).slice().sort((a,b)=>b.wickets-a.wickets || (a.runsConceded/Math.max(a.overs,1))-(b.runsConceded/Math.max(b.overs,1)))[0];
  if (topWkt) topWkt.econ = topWkt.overs ? topWkt.runsConceded/topWkt.overs : 0;
  const motmCounts = {};
  scs.forEach(m=>{ if(m.lastAwards && m.lastAwards.motm){ motmCounts[m.lastAwards.motm.n]=(motmCounts[m.lastAwards.motm.n]||0)+1; }});
  const motm = Object.entries(motmCounts).sort((a,b)=>b[1]-a[1])[0];
  // Narrative
  let title, body, epilogue = "", verdictTag = "";
  if (won) {
    title = "🏆 CHAMPIONS!"; verdictTag = "GLORY";
    body = `${wins} wins, ${points} points. Lifted the ${t.name} trophy with style. ${runsScored} runs scored, ${runsConceded} conceded — a season for the history books.`;
    if (topRun) epilogue = `${topRun.n} ran the show with ${topRun.runs} runs. Different gravy.`;
  } else if (finish === 2) {
    title = "NEARLY MEN"; verdictTag = "SO CLOSE";
    body = `${wins} wins, ${losses} losses, ${points} points. Runners-up. Title race fell short, but nobody can call that a failure of a season.`;
    if (topRun) epilogue = `${topRun.n} carried the batting. Just didn't have enough in the tank.`;
  } else if (finish <= 4) {
    title = "PLAYOFF EXIT"; verdictTag = "BUILD ON IT";
    body = `Finished ${ordinal(finish)} in the league with ${wins} wins. Got to the business end, ran out of fuel in the playoffs.`;
    if (topRun) epilogue = `${topRun.n} was the bright spark of the season with ${topRun.runs} runs.`;
  } else {
    title = "GROUP STAGE EXIT"; verdictTag = "REBUILD";
    body = `Finished ${ordinal(finish)} in the league. ${wins} wins, ${losses} losses, ${points} points. Couldn't crack the top 4 — there's a squad here, just needs better balance.`;
    if (topRun && topRun.runs > 0) epilogue = `${topRun.n} carried the batting with ${topRun.runs} runs. Not enough support around the talisman.`;
  }
  if (finish < o.projected) verdictTag = "OVER-DELIVERED";
  else if (finish > o.projected + 1) verdictTag = "UNDERWHELMED";
  else if (finish === o.projected) verdictTag = "AS EXPECTED";
  return {
    won, finish, projected: o.projected, wins, draws, losses, points,
    runsScored, runsConceded, title, body, epilogue, verdictTag,
    awards: { topRun, topWkt, motm: motm ? { n: motm[0] } : null }
  };
}

function renderLive(){
  // Defensive: a reload can land here with no live match in state (tour is
  // nulled while a match is live). Fall back to the hub instead of crashing.
  if (!S.tour || !S.tour.currentMatch){ S.screen = "hub"; return renderHub(); }
  const t = TOURNAMENTS.find(x=>x.id===S.tour.tId);
  const opp = S.tour.opps[S.tour.roundIdx];
  const m = S.tour.currentMatch;
  const innIdx = S.tour.currentInn || 0;
  const inn = m.innings[innIdx];
  const battingIsYou = inn.batTeam === "You";
  const wrap = el(`<div></div>`);
  wrap.append(el(`<h1>${t.icon} ${t.rounds[S.tour.roundIdx]} <span class="muted" style="font-weight:400">vs</span> ${opp.n}</h1>`));
  const totalInn = m.innings.length;
  const showTarget = m.target && innIdx === totalInn - 1;
  let status = "";
  if (m.format === "wtc" && innIdx >= 1){
    const teamA = m.firstBatTeam;
    const teamB = teamA === "You" ? opp.n : "You";
    const a1 = m.innings[0], b1 = m.innings[1];
    const a2 = innIdx >= 2 ? m.innings[2] : null;
    if (innIdx === 1) status = `${teamA} ${a1.runs}/${a1.wickets} (${a1.overs})`;
    else if (innIdx === 2) status = `${teamA} ${a1.runs} · ${teamB} ${b1.runs}/${b1.wickets} (${b1.overs})`;
    else if (innIdx === 3) status = `${teamA} ${a1.runs} & ${a2.runs}/${a2.wickets} · ${teamB} ${b1.runs}`;
  }
  wrap.append(el(`<p class="muted">${teamLabel(m.toss.winner)} won the toss and chose to ${m.toss.decision}. Innings ${innIdx+1}/${totalInn}${showTarget?` · target ${m.target}`:''}</p>`));
  if (status) wrap.append(el(`<p class="muted" style="font-size:13px;color:var(--gold)">📋 ${status}</p>`));
  const sb = el(`<div class="scoreboard"></div>`);
  const teams = el(`<div class="sb-teams"></div>`);
  teams.append(el(`<div class="sb-team batting"><div class="nm">${teamLabel(inn.batTeam)} — batting</div><div class="sc">${S.tour.liveRuns||0}/${S.tour.liveWkts||0}</div><div class="ov">${S.tour.liveOver||'0.0'} overs</div></div>`));
  teams.append(el(`<div class="sb-vs">VS</div>`));
  const other = innIdx===0 ? null : m.innings[0];
  teams.append(el(`<div class="sb-team"><div class="nm">${teamLabel(inn.bowlTeam)} — ${other?'batted':'bowling'}</div><div class="sc">${other?other.runs+'/'+other.wickets:'—'}</div><div class="ov">${other?other.overs+' overs':'yet to bat'}</div></div>`));
  sb.append(teams);
  sb.append(el(`<div class="sb-bar"><i style="width:0%"></i></div>`));
  wrap.append(sb);

  // Chase tracker — only on the final (chasing) innings
  const isChase = innIdx === totalInn - 1 && m.target;
  if (isChase){
    wrap.append(el(`<div class="chase-box" id="chaseBox">
      <div class="it"><small>Target</small><b class="gold">${m.target}</b></div>
      <div class="it"><small>Need</small><b id="chaseNeed" class="red">${m.target}</b></div>
      <div class="it"><small>Balls left</small><b id="chaseBalls">${t.overs*6}</b></div>
      <div class="it"><small>Req rate</small><b id="chaseRRR" class="gold">${(m.target/t.overs).toFixed(2)}</b></div>
    </div>`));
  }

  // Current batters + bowler info
  const li = el(`<div class="live-info">
    <div class="live-box">
      <div class="h">At the crease</div>
      <div class="p on"><b id="liveStriker">—</b><span class="fig" id="liveStrikerFig">0(0)</span></div>
      <div class="p"><b id="liveNonStriker">—</b><span class="fig" id="liveNSFig">0(0)</span></div>
    </div>
    <div class="live-box">
      <div class="h">Bowling</div>
      <div class="p"><b id="liveBowler">—</b><span class="fig" id="liveBowlerFig">—</span></div>
    </div>
  </div>`);
  wrap.append(li);

  wrap.append(el(`<h2>Live commentary</h2>`));
  wrap.append(el(`<div id="commentary" class="commentary"></div>`));
  const row = el(`<div class="row" style="justify-content:space-between;margin-top:12px"></div>`);
  const speed = el(`<div class="row"><span class="muted" style="font-size:12px">Speed:</span></div>`);
  [1,2,4,10].forEach(s=>{
    const b = el(`<button class="${S.tour.speed===s?'gold':'ghost'}" style="padding:6px 12px;font-size:12px">${s}×</button>`);
    b.onclick = () => { S.tour.speed=s; render(); };
    speed.append(b);
  });
  const skip = el(`<button class="ghost">Skip to result →</button>`);
  skip.onclick = () => {
    if (animTimer) { clearTimeout(animTimer); animTimer = null; }
    // Fast-forward through all remaining innings
    let i = S.tour.currentInn || 0;
    while (i < m.innings.length){
      const inn = m.innings[i];
      const startEvt = (i === (S.tour.currentInn||0)) ? S.tour.evtIdx : 0;
      for (let j = startEvt; j < inn.events.length; j++){
        appendCommentary(inn.events[j]);
      }
      i++;
    }
    endMatch(m);
  };
  row.append(speed, skip);
  wrap.append(row);
  return wrap;
}

    shareResult({
      title:"Match Result",
      subtitle:`${t.rounds[S.tour.roundIdx]} vs ${opp.n}`,
      trophyEmoji: m.won ? "🏆" : "🏏",
      headline: m.won ? `WIN by ${margin}` : `Lost by ${margin}`,
      body: `${m.innings[0].batTeam} ${m.innings[0].runs}/${m.innings[0].wickets}<br/>${m.innings[1].batTeam} ${m.innings[1].runs}/${m.innings[1].wickets}`,
      shareText: `${m.won?'Won':'Lost'} ${t.rounds[S.tour.roundIdx]} vs ${opp.n} by ${margin}. Try to beat my XI in Whitewash!\nhttps://whitewash.app/`
    });
  };
  const cont = el(`<button class="primary">View awards →</button>`);
  cont.onclick = continueAfterScorecard;
  row.append(back, share, cont);
  wrap.append(row);
  return wrap;
}

function computeMargin(m){
  if (m.tie) return "Super Over";
  if (m.format === "wtc"){
    const lastChase = m.innings[3];
    if (lastChase.runs >= m.target) return `${10 - lastChase.wickets} wickets`;
    return `${m.target - lastChase.runs - 1} runs`;
  }
  const i0=m.innings[0], i1=m.innings[1];
  if (i1.runs >= (i0.runs+1)) return `${10 - i1.wickets} wickets`;
  return `${i0.runs - i1.runs} runs`;
}

function buildCareerSummary(){
  const stats = S.playerStats || {};
  let totalRuns = 0, totalBalls = 0, totalFours = 0, totalSixes = 0;
  let totalWkts = 0, totalBallsBowled = 0, totalRunsConceded = 0;
  let totalMatches = 0, totalMotm = 0;
  const players = [];
  for (const n in stats){
    const s = stats[n];
    totalRuns += s.runs; totalBalls += s.balls; totalFours += s.fours; totalSixes += s.sixes;
    totalWkts += s.wickets; totalBallsBowled += s.ballsBowled; totalRunsConceded += s.runsConceded;
    totalMatches = Math.max(totalMatches, s.matches);
    totalMotm += s.motm;
    if (s.runs > 0 || s.wickets > 0) players.push({ n, ...s });
  }
  const topRun = players.slice().sort((a,b)=>b.runs-a.runs)[0];
  const topWkt = players.filter(p=>p.wickets>0).slice().sort((a,b)=>b.wickets-a.wickets)[0];
  const motmLeader = players.slice().sort((a,b)=>b.motm-a.motm)[0];
  const sr = totalBalls ? ((totalRuns/totalBalls)*100).toFixed(1) : '0.0';
  const econ = totalBallsBowled ? (totalRunsConceded/(totalBallsBowled/6)).toFixed(2) : '0.00';
  const trophies = ["ipl","psl","bbl","cl"].filter(k=>S.trophies[k]);
  return { totalRuns, totalBalls, totalFours, totalSixes, totalWkts, totalBallsBowled, totalRunsConceded,
    totalMatches, totalMotm, topRun, topWkt, motmLeader, sr, econ, trophies };
}
function renderCareerStats(cs){
  const wrap = el(`<div style="margin:18px 0"></div>`);
  wrap.append(el(`<h2>Your Career — Season Stats</h2>`));
  wrap.append(el(`<div class="big-stats">
    <div class="big-stat"><div class="v g">${cs.totalRuns}</div><div class="l">Runs Scored</div></div>
    <div class="big-stat"><div class="v y">${cs.sr}</div><div class="l">Strike Rate</div></div>
    <div class="big-stat"><div class="v r">${cs.totalWkts}</div><div class="l">Wickets Taken</div></div>
  </div>`));
  wrap.append(el(`<div class="big-stats" style="margin-top:10px">
    <div class="big-stat"><div class="v">${cs.totalFours}</div><div class="l">Fours</div></div>
    <div class="big-stat"><div class="v g">${cs.totalSixes}</div><div class="l">Sixes</div></div>
    <div class="big-stat"><div class="v y">${cs.econ}</div><div class="l">Bowl Econ</div></div>
  </div>`));
  if (cs.topRun || cs.topWkt || cs.motmLeader){
    const awards = el(`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px"></div>`);
    if (cs.topRun) awards.append(el(`<div class="stat-card motm-card" style="text-align:center"><div class="h" style="justify-content:center"><b>🏏 Top Run-scorer</b></div><div style="margin-top:4px"><b>${cs.topRun.n}</b><br><span style="color:var(--green);font-weight:900">${cs.topRun.runs} runs</span></div></div>`));
    if (cs.topWkt) awards.append(el(`<div class="stat-card motm-card" style="text-align:center"><div class="h" style="justify-content:center"><b>🎯 Top Wicket-taker</b></div><div style="margin-top:4px"><b>${cs.topWkt.n}</b><br><span style="color:var(--red);font-weight:900">${cs.topWkt.wickets} wkts</span></div></div>`));
    if (cs.motmLeader && cs.motmLeader.motm > 0) awards.append(el(`<div class="stat-card motm-card" style="text-align:center"><div class="h" style="justify-content:center"><b>🏅 MOTM Leader</b></div><div style="margin-top:4px"><b>${cs.motmLeader.n}</b><br><span style="color:var(--gold);font-weight:900">${cs.motmLeader.motm} medals</span></div></div>`));
    wrap.append(awards);
  }
  return wrap;
}
function renderWin(){
  setTimeout(()=>{
    sfx("win");
    const c = document.createElement("div"); c.className = "confetti";
    const colors = ['#f5c451','#3ddc97','#5aa9ff','#ff5d73','#a578f0'];
    for (let i=0;i<120;i++){
      const p = document.createElement("i");
      p.style.left = Math.random()*100+'%';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration = (2+Math.random()*3)+'s';
      p.style.animationDelay = (Math.random()*1.5)+'s';
      c.appendChild(p);
    }
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 8000);
  },50);
  const cs = buildCareerSummary();
  // Invincible = won all four AND lost zero matches across the whole run.
  // (Recording into ww_records already happened in commitGrandSlam.)
  const run = ensureRun();
  const invincible = run.losses === 0;
  const rec = loadRecords();
  const wrap = el(`<div></div>`);
  wrap.append(el(`<div class="hero" style="background:radial-gradient(ellipse at center,${invincible?'#0d3a24':'#3a2a08'} 0%,transparent 60%)">
    <h1 style="font-size:72px;letter-spacing:4px">${invincible?'🛡🏆🏆🏆🏆':'🏆🏆🏆🏆'}</h1>
    <h1 style="font-size:48px;background:linear-gradient(180deg,${invincible?'#3ddc97,#2eb47a':'#f5c451,#d4a435'});-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">${invincible?'INVINCIBLE':'GRAND SLAM'}</h1>
    <p>You won the IPL, PSL, Big Bash & Champions League${invincible?' <b style="color:var(--green)">without losing a single match</b>.':` — ${run.losses} loss${run.losses===1?'':'es'} along the way.`} ${run.wins} wins this run.</p>
  </div>`));
  // Next-challenge call to action
  if (invincible){
    wrap.append(el(`<div class="narrative" style="border-color:var(--green);background:linear-gradient(135deg,rgba(61,220,151,.12),rgba(61,220,151,.03))">
      <h3 style="color:var(--green)">🛡 INVINCIBLE — ${rec.invincibles||1} all-time</h3>
      <p>A flawless run. Every match, won. Almost nobody does this.</p>
      <p class="epi">There's no higher mountain. Draft a new XI and see if lightning strikes twice.</p>
    </div>`));
  } else {
    wrap.append(el(`<div class="narrative">
      <h3 style="color:var(--gold-bright)">🎯 THE FINAL CHALLENGE</h3>
      <p>Grand Slam #${rec.grandSlams||1} — but you dropped ${run.losses} match${run.losses===1?'':'es'} on the way.</p>
      <p class="epi">Now go <b style="color:var(--green)">Invincible</b>: draft a new XI and win all four without losing a single match. The rarest badge in the game.</p>
    </div>`));
  }
  wrap.append(renderCareerStats(cs));
  const row = el(`<div class="row" style="justify-content:center;margin-top:20px;gap:10px"></div>`);
  const share = el(`<button class="share-btn" style="padding:14px 24px;font-size:15px">📸 Share ${invincible?'Invincible':'Grand Slam'}</button>`);
  share.onclick = () => {
    shareResult({
      title: invincible ? "INVINCIBLE" : "GRAND SLAM",
      subtitle: invincible ? "Zero matches lost" : `${run.losses} loss${run.losses===1?'':'es'} on the way`,
      trophyEmoji: invincible ? "🛡🏆🏆🏆🏆" : "🏆🏆🏆🏆",
      headline: invincible ? "INVINCIBLE!" : "I won the GRAND SLAM!",
      body: invincible ? "All four trophies, not a single match lost." : "IPL · PSL · Big Bash · Champions League",
      shareText: (invincible?"🛡 INVINCIBLE — all four trophies, zero losses. ":"🏆🏆🏆🏆 I won the Grand Slam in Whitewash Cricket. ") + "Think you can match it?\nhttps://whitewash.app/"
    });
  };
  const a = el(`<button class="primary" style="padding:14px 28px;font-size:15px">${invincible?'Run it back →':'Go Invincible next →'}</button>`);
  a.onclick = () => reset();
  row.append(share, a);
  wrap.append(row);
  return wrap;
}

if (S.tour && !S.tour.speed) S.tour.speed = 2;

function showSplash(){
  const sp = document.createElement('div');
  sp.id = "splash";
  sp.innerHTML = `<div class="splash-inner">
    <div class="splash-logo">Whitewash</div>
    <div class="splash-tagline">Cricket Squad Draft</div>
    <div class="splash-ball"></div>
    <div class="splash-bat">🏏</div>
  </div>`;
  document.body.appendChild(sp);
  // Allow tap to skip
  sp.onclick = () => fadeSplash(sp);
  setTimeout(()=>fadeSplash(sp), 1800);
}
function fadeSplash(sp){
  if (!sp || sp._fading) return;
  sp._fading = true;
  sp.classList.add("fade");
  setTimeout(()=>sp.remove(), 700);
}
// Show splash on first visit per session (skip if user came in mid-flow via reload)
if (!window.sessionStorage.getItem("splashShown")){
  window.sessionStorage.setItem("splashShown", "1");
  showSplash();
}
render();
</script>
